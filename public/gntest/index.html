<!doctype html>
<meta charset="utf8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>GN500 city search test</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  body{font:15px system-ui,sans-serif;max-width:980px;margin:32px auto;padding:0 16px;color:#111}
  h3{margin:0 0 12px}
  input,select{font:inherit;padding:8px;box-sizing:border-box}
  input{width:60%}
  .wrap{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
  .left{flex:1 1 440px;min-width:300px}
  .right{flex:1 1 380px;position:sticky;top:20px}
  #map{height:520px;border-radius:8px;border:1px solid #e5e5e5}
  .r{padding:8px 10px;border-bottom:1px solid #eee;cursor:pointer}
  .r:hover{background:#f6f8fa}
  .r.sel{background:#eaf2ff}
  .t{font-weight:600;display:flex;align-items:center;gap:8px}
  .flag{width:22px;height:16px;flex:none;object-fit:cover;border-radius:2px;box-shadow:0 0 0 1px rgba(0,0,0,.08)}
  .s{color:#666;font-size:13px}
  .d{color:#aaa;font-size:11px}
  .hint{color:#999;font-size:12px;margin:14px 0}
  footer{color:#bbb;font-size:11px;margin-top:24px}
  footer a{color:#bbb}
</style>
<h3>GN500 поиск города (тест)</h3>
<div class="wrap">
  <div class="left">
    <select id="lang"><option>ru</option><option>en</option><option>es</option></select>
    <input id="q" placeholder="Ярос / Yaros / paris …" autofocus autocomplete="off">
    <div class="hint">geocoding v2 spike · TRIP-145 · Supabase dev · клик по городу → точка на карте · удаляется после замера</div>
    <div id="out"></div>
  </div>
  <div class="right"><div id="map"></div></div>
</div>
<footer>Data: <a href="https://www.geonames.org/" rel="noopener">GeoNames</a> (CC-BY 4.0) · Map: <a href="https://www.openstreetmap.org/copyright" rel="noopener">OpenStreetMap</a></footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const sb = createClient(
    'https://nydhzevdizkfaxdlikgc.supabase.co',
    'sb_publishable_u30gT5L10V0kYDE4mCR3vQ_P4hhINCP'
  );
  const q = document.getElementById('q');
  const lang = document.getElementById('lang');
  const out = document.getElementById('out');
  const esc = s => String(s ?? '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

  const map = L.map('map').setView([20, 0], 2);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '© OpenStreetMap'
  }).addTo(map);
  let marker = null;
  const mark = (r) => {
    const ll = [r.lat, r.lng];
    if (marker) marker.setLatLng(ll); else marker = L.marker(ll).addTo(map);
    marker.bindPopup(`<b>${esc(r.display)}</b><br>${esc(r.subtitle || '')}`).openPopup();
    map.setView(ll, 9);
  };

  let rows = [], t, seq = 0;
  out.addEventListener('click', e => {
    const el = e.target.closest('.r'); if (!el) return;
    out.querySelectorAll('.r.sel').forEach(n => n.classList.remove('sel'));
    el.classList.add('sel');
    mark(rows[+el.dataset.i]);
  });

  const run = async () => {
    const v = q.value.trim();
    if (v.length < 2) { out.innerHTML = ''; rows = []; return; }
    const my = ++seq;
    const { data, error } = await sb.rpc('search_gazetteer', { q: v, lang: lang.value, lim: 10 });
    if (my !== seq) return; // a newer keystroke already fired — drop this stale response
    if (error) { out.textContent = error.message; return; }
    rows = data || [];
    out.innerHTML = rows.map((r, i) => {
      const cc = (r.country_code || '').toLowerCase();
      const flag = cc ? `<img class="flag" src="/flags/${esc(cc)}.svg" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
      return `<div class="r" data-i="${i}">
      <div class="t">${flag}<span>${esc(r.display)}</span></div>
      <div class="s">${esc(r.subtitle || '')}</div>
      <div class="d">${r.geonameid} · ${esc(r.feature_code)} · pop ${r.population ?? 0} · ${r.lat},${r.lng}</div>
    </div>`;
    }).join('');
  };
  q.oninput = () => { clearTimeout(t); t = setTimeout(run, 250); };
  lang.onchange = run;
</script>
