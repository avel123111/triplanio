# Supabase CLI config.
#
# WHY THIS FILE EXISTS:
# `supabase functions deploy <fn>` defaults to verify_jwt = TRUE. For functions
# that authenticate the caller themselves (N8N_SECRET / Stripe signature /
# public share link / Telegram webhook), verify_jwt MUST be false — otherwise
# the Supabase gateway rejects the caller with 401 before the function runs and
# the integration breaks (this happened to getTripByTelegramChatId on prod,
# 2026-05-30). Declaring it here pins the setting so CLI deploys keep it.
#
# Functions NOT listed below default to verify_jwt = true (require a valid
# Supabase JWT). The 13 entries below mirror the live settings on both projects
# (prod tizscxrpuopobgcxbekf + dev nydhzevdizkfaxdlikgc, verified 25.06.2026).
#
# project_id is only the default link target; deploys pass an explicit
# --project-ref (dev: nydhzevdizkfaxdlikgc, prod: tizscxrpuopobgcxbekf), so the
# verify_jwt overrides apply to whichever project is targeted.

project_id = "tizscxrpuopobgcxbekf"

# --- verify_jwt = false (custom auth: N8N_SECRET / Stripe sig / public / webhook) ---

[functions.getTripByTelegramChatId]
verify_jwt = false

[functions.getTripById]
verify_jwt = false

[functions.getPublicTrip]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.telegramWebhook]
verify_jwt = false

[functions.triplanioAiReply]
verify_jwt = false

[functions.getPendingReminders]
verify_jwt = false

# aiGate — привратник TG-бота (TRIP-111). Вызывается только из n8n с
# Bearer <N8N_SECRET> (requireN8nSecret), Telegram-апдейт мимо JWT.
[functions.aiGate]
verify_jwt = false

# Anonymous (logged-out) callers: login/signup/reset preflight.
[functions.signupPrecheck]
verify_jwt = false

[functions.requestPasswordReset]
verify_jwt = false

# Authenticates the caller itself (getRequestUser + isCallerParticipant) and is
# only ever called by the frontend with a user JWT. Pinned false to mirror live
# (prod+dev, 25.06.2026) so the first config-driven CI deploy is a strict no-op
# on auth. Flipping this to true is a separate, deliberate security decision
# (smoke-test TG disconnect first) — not an infra side-effect.
[functions.telegramDisconnect]
verify_jwt = false
