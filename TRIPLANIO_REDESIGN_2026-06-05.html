<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triplanio — Redesign Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TRIPLANIO — "ATLAS" DESIGN SYSTEM
   Blue primary, bold contrasting category accents.
   ============================================================ */
:root{
  /* Brand blue ramp */
  --blue-50:#eef3ff; --blue-100:#dce6ff; --blue-200:#bdd0ff; --blue-300:#93b0ff;
  --blue-400:#5d83fb; --blue-500:#3a64f4; --blue-600:#2756e6; --blue-700:#1d44c4;
  --blue-800:#1b3a9e; --blue-900:#1a3380;
  --brand:var(--blue-600); --brand-press:var(--blue-700); --brand-soft:var(--blue-50);

  /* Category / semantic accents */
  --teal:#0bb39b; --teal-soft:#e2f7f3; --teal-ink:#067a6a;     /* hotels / stays */
  --coral:#ff6a3d; --coral-soft:#fff0eb; --coral-ink:#c9471f;  /* activities */
  --amber:#f6a609; --amber-soft:#fff5e0; --amber-ink:#a96f00;  /* warnings / deadlines / budget */
  --green:#15a37a; --green-soft:#e4f6ef; --green-ink:#0c7a59;  /* success / paid */
  --rose:#e5484d; --rose-soft:#fdeaea; --rose-ink:#b42a2f;     /* danger */
  --violet:#7458ff; --violet-soft:#efeaff; --violet-ink:#5538d6;/* AI / Triplanio */

  /* Ink & neutrals (cool slate) */
  --ink:#0d1220; --slate-800:#1b2436; --slate-700:#33415a; --slate-600:#48566f;
  --slate-500:#677289; --slate-400:#8b94a7; --slate-300:#b8c0d0;
  --line:#e7eaf1; --line-strong:#d7dce7; --wash:#f4f6fb; --wash-2:#eef1f8;
  --surface:#ffffff; --bg:#f6f7fc;

  /* Type */
  --display:"Bricolage Grotesque", system-ui, sans-serif;
  --sans:"Instrument Sans", system-ui, sans-serif;
  --mono:"JetBrains Mono", ui-monospace, monospace;

  /* Shadows (cool slate) */
  --sh-xs:0 1px 2px rgba(20,32,64,.06);
  --sh-sm:0 2px 8px rgba(20,32,64,.07);
  --sh-md:0 8px 24px rgba(20,32,64,.10);
  --sh-lg:0 18px 50px rgba(20,32,64,.16);
  --sh-pop:0 24px 70px rgba(13,18,32,.28);

  /* Radius */
  --r-xs:8px; --r-sm:11px; --r-md:14px; --r-lg:20px; --r-xl:28px; --r-pill:999px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); background:var(--bg); color:var(--ink);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
h1,h2,h3,h4{font-family:var(--display); font-weight:600; margin:0; letter-spacing:-.01em; line-height:1.12}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
a{color:inherit; text-decoration:none}
.mono{font-family:var(--mono); font-variant-numeric:tabular-nums}
.tnum{font-variant-numeric:tabular-nums}
::selection{background:var(--blue-200)}

/* Scrollbars */
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:99px;border:3px solid transparent;background-clip:content-box}
*::-webkit-scrollbar-thumb:hover{background:var(--slate-300);background-clip:content-box}

/* ============ PROTOTYPE CHROME (the device frame + navigator) ============ */
#proto{
  position:fixed; inset:0; display:flex; flex-direction:column;
  background:
    radial-gradient(1200px 600px at 12% -10%, #eaf0ff 0%, transparent 55%),
    radial-gradient(900px 500px at 100% 0%, #fff1ec 0%, transparent 45%),
    #e9edf6;
}
#proto-bar{
  height:52px; flex:0 0 52px; display:flex; align-items:center; gap:14px;
  padding:0 16px; background:rgba(255,255,255,.78); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line); z-index:50;
}
#proto-bar .pb-brand{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:700;font-size:15px}
#proto-bar .pb-brand .dot{width:22px;height:22px;border-radius:7px;background:var(--brand);display:grid;place-items:center;color:#fff;box-shadow:var(--sh-sm)}
.pb-tag{font-size:11px;font-weight:600;color:var(--slate-500);background:var(--wash);padding:3px 9px;border-radius:99px;border:1px solid var(--line)}
.pb-spacer{flex:1}
.pb-seg{display:flex;background:var(--wash);border:1px solid var(--line);border-radius:99px;padding:3px}
.pb-seg button{font-size:12px;font-weight:600;color:var(--slate-500);padding:5px 13px;border-radius:99px;display:flex;align-items:center;gap:6px}
.pb-seg button.on{background:#fff;color:var(--brand);box-shadow:var(--sh-xs)}
.pb-jump{position:relative}
.pb-jump-btn{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--slate-700);background:#fff;border:1px solid var(--line-strong);border-radius:99px;padding:7px 13px;box-shadow:var(--sh-xs)}
.pb-menu{position:absolute;top:46px;right:0;width:280px;max-height:70vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--sh-lg);padding:8px;display:none;z-index:60}
.pb-menu.open{display:block}
.pb-menu .grp{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--slate-400);padding:10px 10px 5px}
.pb-menu button.item{width:100%;text-align:left;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;color:var(--slate-700);padding:8px 10px;border-radius:9px}
.pb-menu button.item:hover{background:var(--wash)}
.pb-menu button.item.cur{background:var(--brand-soft);color:var(--brand)}
.pb-menu button.item i{width:16px;text-align:center;color:var(--slate-400);font-style:normal}

/* Stage that holds the app; switches between desktop & phone */
#stage{flex:1;overflow:auto;display:flex;justify-content:center;padding:0}
#stage.phone{padding:26px 0;align-items:flex-start}
#device{width:100%;height:100%;background:var(--bg);position:relative;overflow:hidden}
#stage.phone #device{
  width:402px;height:850px;max-height:calc(100vh - 104px);flex:0 0 auto;
  border-radius:42px;box-shadow:var(--sh-pop), 0 0 0 11px #11151f, 0 0 0 13px #2a3142;
  overflow:hidden;
}
#stage.phone #device::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:128px;height:30px;background:#11151f;border-radius:0 0 18px 18px;z-index:200}
#app{width:100%;height:100%;overflow:hidden;position:relative}

/* ===================== APP SHELL ===================== */
.shell{display:grid;grid-template-columns:240px 1fr;height:100%;background:var(--bg)}
.shell.with-rail{grid-template-columns:240px 1fr}
.collapsed .shell{grid-template-columns:72px 1fr}

/* Topbar */
.topbar{
  position:sticky;top:0;z-index:30;height:64px;display:flex;align-items:center;gap:14px;
  padding:0 22px;background:rgba(255,255,255,.82);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);grid-column:1 / -1;
}
.tb-brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:-.02em}
.tb-brand .mk{width:30px;height:30px;border-radius:9px;background:linear-gradient(140deg,var(--blue-500),var(--blue-700));display:grid;place-items:center;color:#fff;box-shadow:var(--sh-sm)}
.crumb{display:flex;align-items:center;gap:10px;color:var(--slate-400);font-size:14px;min-width:0}
.crumb .sep{color:var(--line-strong)}
.crumb .tname{color:var(--ink);font-weight:600;font-family:var(--display);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.crumb .tdates{font-size:12.5px;color:var(--slate-500);font-variant-numeric:tabular-nums}
.tb-spacer{flex:1}
.tb-search{display:flex;align-items:center;gap:9px;background:var(--wash);border:1px solid var(--line);border-radius:99px;padding:8px 14px;color:var(--slate-400);font-size:13px;min-width:200px;cursor:text}
.tb-search kbd{margin-left:auto;font-family:var(--mono);font-size:10px;background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:var(--slate-400)}
.tb-ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:var(--slate-600);position:relative;transition:.15s}
.tb-ico:hover{background:var(--wash);color:var(--ink)}
.tb-ico .badge{position:absolute;top:5px;right:5px;min-width:16px;height:16px;padding:0 4px;border-radius:99px;background:var(--coral);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;border:2px solid #fff}
.tb-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--coral),#ff9a3d);display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;cursor:pointer;box-shadow:var(--sh-xs)}

/* Nav rail */
.rail{border-right:1px solid var(--line);background:rgba(255,255,255,.55);padding:16px 14px;overflow:auto;display:flex;flex-direction:column;gap:4px}
.rail .rgrp{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--slate-400);padding:14px 12px 6px}
.collapsed .rail .rgrp{text-align:center;padding:12px 0 6px;font-size:9px}
.navitem{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;color:var(--slate-600);font-weight:500;font-size:14px;position:relative;transition:.13s}
.navitem i{width:20px;text-align:center;font-style:normal;font-size:18px;flex:0 0 20px;color:var(--slate-400);transition:.13s}
.navitem:hover{background:var(--wash);color:var(--ink)}
.navitem:hover i{color:var(--slate-600)}
.navitem.on{background:var(--brand-soft);color:var(--brand)}
.navitem.on i{color:var(--brand)}
.navitem .nb{margin-left:auto;min-width:20px;height:20px;padding:0 6px;border-radius:99px;background:var(--wash-2);color:var(--slate-500);font-size:11px;font-weight:700;display:grid;place-items:center}
.navitem.on .nb{background:#fff;color:var(--brand)}
.navitem .warn-dot{margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--amber)}
.collapsed .navitem{justify-content:center;padding:11px 0}
.collapsed .navitem span.lbl,.collapsed .navitem .nb,.collapsed .navitem .warn-dot{display:none}
.rail-foot{margin-top:auto;padding-top:12px}
.rail-pro{background:linear-gradient(135deg,var(--violet),#9b7bff);border-radius:var(--r-md);padding:14px;color:#fff;box-shadow:var(--sh-sm)}
.rail-pro .t{font-family:var(--display);font-weight:700;font-size:14px;display:flex;align-items:center;gap:7px}
.rail-pro p{font-size:11.5px;opacity:.9;margin:6px 0 10px;line-height:1.4}
.rail-pro button{width:100%;background:#fff;color:var(--violet-ink);font-weight:700;font-size:12.5px;padding:8px;border-radius:9px}
.collapsed .rail-pro p,.collapsed .rail-pro button span{display:none}

/* Main content area */
.main{overflow:auto;position:relative}
.canvas{display:grid;grid-template-columns:1fr 332px;gap:26px;max-width:1240px;margin:0 auto;padding:26px 30px 80px}
.canvas.solo{grid-template-columns:1fr;max-width:1080px}
.canvas.wide{max-width:1320px}
@media(max-width:1180px){.canvas{grid-template-columns:1fr}.dossier{display:none}}

/* ============ REUSABLE COMPONENTS ============ */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--sh-xs)}
.card.pad{padding:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:13.5px;padding:10px 16px;border-radius:11px;transition:.15s;white-space:nowrap}
.btn i{font-style:normal;font-size:17px}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 4px 14px rgba(39,86,230,.28)}
.btn-primary:hover{background:var(--brand-press);transform:translateY(-1px);box-shadow:0 7px 20px rgba(39,86,230,.34)}
.btn-ghost{background:#fff;color:var(--slate-700);border:1px solid var(--line-strong)}
.btn-ghost:hover{background:var(--wash);border-color:var(--slate-300)}
.btn-soft{background:var(--brand-soft);color:var(--brand)}
.btn-soft:hover{background:var(--blue-100)}
.btn-coral{background:var(--coral);color:#fff;box-shadow:0 4px 14px rgba(255,106,61,.3)}
.btn-coral:hover{filter:brightness(.96);transform:translateY(-1px)}
.btn-danger{background:var(--rose);color:#fff}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px}
.btn-lg{padding:13px 22px;font-size:15px;border-radius:13px}
.btn-block{width:100%}
.btn-ico{width:38px;height:38px;padding:0;border-radius:10px}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:99px;background:var(--wash);color:var(--slate-600);border:1px solid var(--line)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.02em;padding:3px 9px;border-radius:99px}
.tag i{font-style:normal;font-size:13px}
.tag.flight{background:var(--brand-soft);color:var(--blue-700)}
.tag.hotel{background:var(--teal-soft);color:var(--teal-ink)}
.tag.act{background:var(--coral-soft);color:var(--coral-ink)}
.tag.deadline{background:var(--amber-soft);color:var(--amber-ink)}
.tag.service{background:var(--wash-2);color:var(--slate-600)}
.tag.ai{background:var(--violet-soft);color:var(--violet-ink)}
.tag.success{background:var(--green-soft);color:var(--green-ink)}
.tag.danger{background:var(--rose-soft);color:var(--rose-ink)}
.tag.pro{background:linear-gradient(120deg,var(--violet),#9b7bff);color:#fff}

.eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--brand)}
.muted{color:var(--slate-500)}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}
.sec-head h2{font-size:19px}
.sec-head .link{font-size:12.5px;font-weight:600;color:var(--brand);display:flex;align-items:center;gap:5px}

.icotile{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-style:normal;font-size:20px;flex:0 0 42px}
.icotile.blue{background:var(--brand-soft);color:var(--brand)}
.icotile.teal{background:var(--teal-soft);color:var(--teal-ink)}
.icotile.coral{background:var(--coral-soft);color:var(--coral-ink)}
.icotile.amber{background:var(--amber-soft);color:var(--amber-ink)}
.icotile.violet{background:var(--violet-soft);color:var(--violet-ink)}
.icotile.green{background:var(--green-soft);color:var(--green-ink)}
.icotile.slate{background:var(--wash-2);color:var(--slate-600)}

/* Dossier (context rail) */
.dossier{display:flex;flex-direction:column;gap:16px;position:sticky;top:90px;align-self:start}

/* Empty state */
.empty{text-align:center;padding:48px 24px;border:1.5px dashed var(--line-strong);border-radius:var(--r-md);background:var(--surface)}
.empty .ei{width:58px;height:58px;border-radius:16px;background:var(--wash);display:grid;place-items:center;margin:0 auto 14px;font-size:26px;color:var(--slate-400);font-style:normal}
.empty h3{font-size:17px;margin-bottom:6px}
.empty p{font-size:13.5px;color:var(--slate-500);max-width:340px;margin:0 auto 16px}

/* Toggle switch */
.sw{width:42px;height:24px;border-radius:99px;background:var(--line-strong);position:relative;transition:.18s;flex:0 0 42px}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:var(--sh-xs);transition:.18s}
.sw.on{background:var(--brand)}
.sw.on::after{left:20px}

/* Progress / meters */
.meter{height:8px;border-radius:99px;background:var(--wash-2);overflow:hidden}
.meter>i{display:block;height:100%;border-radius:99px;background:var(--brand)}
.seg-meter{height:10px;border-radius:99px;overflow:hidden;display:flex;background:var(--wash-2)}
.seg-meter>i{height:100%}

/* Avatars */
.av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12.5px;border:2px solid #fff;box-shadow:var(--sh-xs)}
.av-stack{display:flex}
.av-stack .av{margin-left:-9px}
.av-stack .av:first-child{margin-left:0}

/* Inputs */
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--slate-700);margin-bottom:6px}
.inp{width:100%;font-family:inherit;font-size:14px;padding:11px 13px;border:1px solid var(--line-strong);border-radius:11px;background:#fff;color:var(--ink);transition:.15s}
.inp:focus{outline:none;border-color:var(--blue-400);box-shadow:0 0 0 3px var(--blue-100)}
.inp::placeholder{color:var(--slate-400)}
textarea.inp{resize:vertical;min-height:74px}

/* ===================== OVERLAYS: modal + bottom sheet ===================== */
.scrim{position:absolute;inset:0;background:rgba(13,18,32,.46);backdrop-filter:blur(3px);z-index:80;display:none;opacity:0;transition:opacity .2s}
.scrim.show{display:block;opacity:1}
.modal{position:absolute;z-index:81;left:50%;top:50%;transform:translate(-50%,-48%);width:min(560px,calc(100% - 40px));max-height:88%;background:#fff;border-radius:var(--r-lg);box-shadow:var(--sh-pop);display:none;flex-direction:column;overflow:hidden;opacity:0;transition:.22s}
.modal.show{display:flex;opacity:1;transform:translate(-50%,-50%)}
.modal-h{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
.modal-h h3{font-size:17px;flex:1}
.modal-b{padding:20px;overflow:auto}
.modal-f{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--wash)}
.x-btn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--slate-500)}
.x-btn:hover{background:var(--wash)}

/* Right slide-in panel (entity) */
.panel{position:absolute;z-index:81;top:0;right:0;height:100%;width:min(460px,100%);background:#fff;box-shadow:var(--sh-pop);display:none;flex-direction:column;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1)}
.panel.show{display:flex;transform:translateX(0)}
.panel-h{display:flex;align-items:flex-start;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
.panel-b{padding:18px 20px;overflow:auto;flex:1}
.panel-f{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;background:var(--wash)}

/* Bottom sheet (mobile-first overlay) */
.sheet{position:absolute;z-index:82;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;box-shadow:var(--sh-pop);display:none;flex-direction:column;max-height:90%;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sheet.show{display:flex;transform:translateY(0)}
.sheet .grab{width:42px;height:5px;border-radius:99px;background:var(--line-strong);margin:10px auto 4px}
.sheet-b{padding:8px 20px 24px;overflow:auto}

/* Mobile bottom tab bar */
.tabbar{display:none;position:absolute;bottom:0;left:0;right:0;height:64px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);z-index:40;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom)}
.tabbar button{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--slate-400);flex:1}
.tabbar button i{font-style:normal;font-size:21px}
.tabbar button.on{color:var(--brand)}
.tabbar .fab{flex:0 0 auto;width:50px;height:50px;border-radius:16px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:24px;box-shadow:0 6px 18px rgba(39,86,230,.4);margin-top:-18px}

/* Screen visibility */
.screen{display:none}
.screen.active{display:block}

/* Stat number */
.statnum{font-family:var(--display);font-weight:700;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums}

/* utility */
.row{display:flex;align-items:center;gap:10px}
.col{display:flex;flex-direction:column}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.wrap{flex-wrap:wrap}
.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g16{gap:16px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}
.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}
.fw6{font-weight:600}.fw7{font-weight:700}
.txt-mut{color:var(--slate-500)}

/* ===== Responsive: phone layout when device is narrow ===== */
@media(max-width:560px){
  .canvas{padding:16px 16px 90px}
}

/* ===== PHONE MODE (driven by body.vp-phone, device-frame is 402px) ===== */
body.vp-phone .shell{grid-template-columns:1fr !important}
body.vp-phone .rail{display:none}
body.vp-phone .dossier{display:none}
body.vp-phone .tabbar{display:flex}
body.vp-phone .main{padding-bottom:0}
body.vp-phone .canvas{grid-template-columns:1fr !important;max-width:100% !important;padding:16px 14px 86px !important}
body.vp-phone .topbar{padding:0 14px;gap:8px;height:58px}
body.vp-phone .tb-search,body.vp-phone .crumb .tdates,body.vp-phone .crumb .sep{display:none}
body.vp-phone .topbar .tb-brand span:last-child{display:none}
body.vp-phone .modal{width:calc(100% - 24px)}
body.vp-phone [style*="grid-template-columns:repeat(3,1fr)"]{grid-template-columns:1fr !important}
body.vp-phone [style*="grid-template-columns:repeat(2,1fr)"]{grid-template-columns:1fr !important}
body.vp-phone [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important}
body.vp-phone #statband{grid-template-columns:repeat(3,1fr) !important}
/* two-pane lenses stack vertically on phone */
body.vp-phone .twopane{display:block !important;height:auto !important;grid-template-columns:1fr !important}
body.vp-phone .twopane>*{height:auto !important;border-right:none !important;border-left:none !important;overflow-x:hidden}
body.vp-phone .mappane{height:300px !important;border-top:1px solid var(--line)}
body.vp-phone .twopane .dossier{display:flex !important}
</style>
</head>
<body>

<!-- ============ PROTOTYPE CHROME ============ -->
<div id="proto">
  <div id="proto-bar">
    <div class="pb-brand"><span class="dot">▲</span> Triplanio <span class="pb-tag">Redesign prototype · Atlas</span></div>
    <div class="pb-spacer"></div>
    <div class="pb-seg" id="viewseg">
      <button class="on" data-vp="desktop"><span>▭</span> Desktop</button>
      <button data-vp="phone"><span>▢</span> Mobile</button>
    </div>
    <div class="pb-jump">
      <button class="pb-jump-btn" id="jumpBtn">Jump to screen ▾</button>
      <div class="pb-menu" id="jumpMenu"></div>
    </div>
  </div>
  <div id="stage">
    <div id="device"><div id="app"><!-- app injected here --></div></div>
  </div>
</div>

<script>
/* ================== PROTOTYPE NAVIGATION ================== */
const SCREENS = [
  {grp:'Trip', items:[
    ['overview','Overview','◎'],['timeline','Timeline','≣'],['map','Map','◈'],
    ['calendar','Calendar','▦'],['budget','Budget','€'],['docs','Documents','▤'],
    ['chat','Chat','◗'],['members','Members','◍'],['structure','Structure editor','⟐'],
    ['settings','Trip settings','⚙'],
  ]},
  {grp:'Account', items:[
    ['trips','My trips','▢'],['inbox','Inbox','◔'],['pro','Pro plans','✦'],['account','Account','◑'],
  ]},
  {grp:'Create & entry', items:[
    ['create','Create flow (manual + AI)','＋'],['landing','Landing','★'],['login','Sign in','⊘'],['public','Public trip','◇'],
  ]},
  {grp:'Panels, modals & sheets', items:[
    ['m:entity','Entity panel (view/edit + AI)','▭'],['m:expense','Add expense','€'],
    ['m:doc','Add document','▤'],['m:invite','Invite member','◍'],['m:share','Share','↗'],
    ['m:warnings','What needs attention','!'],['m:prolock','Pro lock','✦'],
    ['m:create','New trip choice','＋'],['m:telegram','Connect Telegram','✈'],
  ]},
];

/* ================== SAMPLE TRIP DATA ================== */
const TRIP = {
  title:"Iberia — Summer ’26", dates:"14–25 Aug 2026", days:12, nights:9,
  origin:"London", currency:"EUR", status:"upcoming", pro:true,
  cities:[
    {name:"Lisbon", cc:"🇵🇹", country:"Portugal", nights:3, range:"14–17 Aug", hotel:"Memmo Alfama", hotelOk:true, transferOk:true, acts:4, temp:29, color:"var(--teal)"},
    {name:"Porto", cc:"🇵🇹", country:"Portugal", nights:2, range:"17–19 Aug", hotel:null, hotelOk:false, transferOk:true, acts:2, temp:27, color:"var(--coral)"},
    {name:"Barcelona", cc:"🇪🇸", country:"Spain", nights:4, range:"19–23 Aug", hotel:"Hotel Brummell", hotelOk:true, transferOk:false, acts:5, temp:31, color:"var(--blue-500)"},
    {name:"Madrid", cc:"🇪🇸", country:"Spain", nights:0, range:"23–25 Aug", hotel:"Only YOU Atocha", hotelOk:true, transferOk:true, acts:3, temp:33, color:"var(--violet)"},
  ],
  members:[
    {n:"You", role:"owner", c:"linear-gradient(135deg,var(--coral),#ff9a3d)", st:"active"},
    {n:"Marta R.", role:"admin", c:"linear-gradient(135deg,var(--teal),#34d6c0)", st:"active"},
    {n:"Iván P.", role:"viewer", c:"linear-gradient(135deg,var(--blue-500),var(--blue-700))", st:"active"},
    {n:"Sofía L.", role:"viewer", c:"linear-gradient(135deg,var(--violet),#9b7bff)", st:"pending"},
  ],
  budget:{spent:4180, planned:4800, cur:"EUR"},
  stats:{hotels:3, transfers:5, activities:14, docs:6},
  warnings:[
    {t:"No transfer into Barcelona", d:"Porto → Barcelona has no flight or train added.", sev:"amber", kind:"flight", to:"timeline"},
    {t:"Missing hotel in Porto", d:"No accommodation booked for 2 nights (17–19 Aug).", sev:"amber", kind:"hotel", to:"timeline"},
    {t:"Cancellation deadline soon", d:"Memmo Alfama — free cancellation ends 10 Aug.", sev:"rose", kind:"deadline", to:"timeline"},
    {t:"Activity outside city window", d:"Sagrada Família is scheduled before arrival in Barcelona.", sev:"amber", kind:"act", to:"calendar"},
  ],
};
const M = n => "€"+n.toLocaleString('en-US');

/* ================== APP STATE & HELPERS ================== */
const App = { screen:"overview", lens:"overview", collapsed:false, vp:"desktop" };
const $ = s => document.querySelector(s);
const APP = $("#app");
const isTripLens = s => ['overview','timeline','map','calendar','budget','docs','chat','members','structure','settings'].includes(s);

/* avatar helper */
function av(m, size){ size=size||34; const init=m.n==="You"?"Y":m.n.split(' ').map(x=>x[0]).join('').slice(0,2);
  return `<div class="av" style="background:${m.c};width:${size}px;height:${size}px;font-size:${size*0.37}px">${init}</div>`; }

/* ================== SHELL ================== */
function railTrip(){
  const L=(id,ic,lbl,extra='')=>`<button class="navitem ${App.lens===id?'on':''}" onclick="go('${id}')"><i>${ic}</i><span class="lbl">${lbl}</span>${extra}</button>`;
  return `
  <div class="rail">
    <button class="navitem" onclick="go('trips')" style="color:var(--slate-500)"><i>‹</i><span class="lbl">All trips</span></button>
    <div class="rgrp">Lenses</div>
    ${L('overview','◎','Overview')}
    ${L('timeline','≣','Timeline')}
    ${L('map','◈','Map')}
    ${L('calendar','▦','Calendar')}
    ${L('budget','€','Budget')}
    ${L('docs','▤','Documents','<span class="nb">6</span>')}
    ${L('chat','◗','Chat','<span class="nb">3</span>')}
    <div class="rgrp">Manage</div>
    ${L('structure','⟐','Structure','<span class="warn-dot"></span>')}
    ${L('members','◍','Members','<span class="nb">4</span>')}
    ${L('settings','⚙','Settings')}
    <div class="rail-foot">
      <div class="rail-pro"><div class="t">✦ <span class="lbl">Triplanio Pro</span></div><p>This trip is Pro — AI parsing, budget & chat unlocked.</p><button onclick="go('pro')"><span>Manage plan</span></button></div>
    </div>
  </div>`;
}
function railAccount(){
  const L=(id,ic,lbl,extra='')=>`<button class="navitem ${App.screen===id?'on':''}" onclick="go('${id}')"><i>${ic}</i><span class="lbl">${lbl}</span>${extra}</button>`;
  return `<div class="rail">
    <div class="rgrp">Workspace</div>
    ${L('trips','▢','My trips')}
    ${L('inbox','◔','Inbox','<span class="nb">3</span>')}
    ${L('pro','✦','Pro plans')}
    ${L('account','◑','Account')}
    <div class="rail-foot"><div class="rail-pro" style="background:linear-gradient(135deg,var(--blue-500),var(--blue-700))"><div class="t">✦ <span class="lbl">Go Pro</span></div><p>AI planning, budgets & unlimited trips.</p><button style="color:var(--blue-700)" onclick="go('pro')"><span>See plans</span></button></div></div>
  </div>`;
}
function topbar(){
  const inTrip = isTripLens(App.screen);
  const crumb = inTrip
    ? `<div class="crumb"><span class="tname">${TRIP.title}</span><span class="sep">·</span><span class="tdates mono">${TRIP.dates}</span> ${TRIP.pro?'<span class="tag pro">PRO</span>':''}</div>`
    : `<div class="crumb muted">Workspace</div>`;
  return `<header class="topbar">
    <div class="tb-brand"><span class="mk">▲</span> Triplanio</div>
    <span class="sep" style="color:var(--line-strong)">/</span>
    ${crumb}
    <div class="tb-spacer"></div>
    <div class="tb-search">⌕ <span>Search trips, places…</span><kbd>⌘K</kbd></div>
    <button class="tb-ico" onclick="go('inbox')">◔<span class="badge">3</span></button>
    <button class="tb-ico" title="Theme">☾</button>
    ${inTrip?`<button class="btn btn-ghost btn-sm" onclick="openSheet('share')">↗ Share</button>`:''}
    <div class="tb-avatar" onclick="go('account')">Y</div>
  </header>`;
}
/* ================== ROUTER ================== */
function render(){
  const inTrip = isTripLens(App.screen);
  const railHTML = inTrip ? railTrip() : railAccount();
  const fullBleed = ['landing','login','create','public'].includes(App.screen);
  if(fullBleed){
    APP.innerHTML = SC[App.screen]() + overlays();
    wireOverlays(); return;
  }
  const body = SC[App.screen] ? SC[App.screen]() : `<div class="canvas solo"><div class="empty"><div class="ei">∅</div><h3>${App.screen}</h3></div></div>`;
  APP.innerHTML = `<div class="shell ${App.collapsed?'collapsed':''}">
    ${topbar()}
    ${railHTML}
    <main class="main" id="main">${body}</main>
  </div>${tabbar()}${overlays()}`;
  wireOverlays();
  const m=$("#main"); if(m) m.scrollTop=0;
}
function go(id){
  if(id.startsWith('m:')){ openModalById(id.slice(2)); return; }
  App.screen=id; if(isTripLens(id)) App.lens=id;
  render(); closeJump();
}
function tabbar(){
  if(!isTripLens(App.screen)) return `<nav class="tabbar"><button class="${App.screen==='trips'?'on':''}" onclick="go('trips')"><i>▢</i>Trips</button><button class="${App.screen==='inbox'?'on':''}" onclick="go('inbox')"><i>◔</i>Inbox</button><button class="fab" onclick="openModalById('create')">＋</button><button class="${App.screen==='pro'?'on':''}" onclick="go('pro')"><i>✦</i>Pro</button><button class="${App.screen==='account'?'on':''}" onclick="go('account')"><i>◑</i>You</button></nav>`;
  return `<nav class="tabbar">
    <button class="${App.lens==='overview'?'on':''}" onclick="go('overview')"><i>◎</i>Overview</button>
    <button class="${App.lens==='timeline'?'on':''}" onclick="go('timeline')"><i>≣</i>Timeline</button>
    <button class="fab" onclick="openSheet('lensmenu')">＋</button>
    <button class="${App.lens==='budget'?'on':''}" onclick="go('budget')"><i>€</i>Budget</button>
    <button onclick="openSheet('lensmenu')"><i>⋯</i>More</button>
  </nav>`;
}

/* ================== OVERLAYS (modals, panels, sheets) ================== */
let OVL = { entity:'', expense:'', doc:'', invite:'', share:'', warnings:'', prolock:'', create:'', telegram:'', lensmenu:'', role:'', category:'', fx:'', moremenu:'' };
function overlays(){
  return `
  <div class="scrim" id="scrim" onclick="closeAll()"></div>
  <div class="panel" id="panel-entity">${OVL.entity||''}</div>
  <div class="modal" id="modal-expense">${OVL.expense||''}</div>
  <div class="modal" id="modal-doc">${OVL.doc||''}</div>
  <div class="modal" id="modal-invite">${OVL.invite||''}</div>
  <div class="modal" id="modal-role">${OVL.role||''}</div>
  <div class="modal" id="modal-category">${OVL.category||''}</div>
  <div class="modal" id="modal-fx">${OVL.fx||''}</div>
  <div class="modal" id="modal-warnings">${OVL.warnings||''}</div>
  <div class="modal" id="modal-prolock">${OVL.prolock||''}</div>
  <div class="modal" id="modal-create">${OVL.create||''}</div>
  <div class="modal" id="modal-telegram">${OVL.telegram||''}</div>
  <div class="sheet" id="sheet-share">${OVL.share||''}</div>
  <div class="sheet" id="sheet-lensmenu">${OVL.lensmenu||''}</div>
  `;
}
function wireOverlays(){ /* placeholder for post-render wiring */ }
function showScrim(){ $("#scrim").classList.add('show'); }
function closeAll(){
  $("#scrim")?.classList.remove('show');
  document.querySelectorAll('.modal,.panel,.sheet').forEach(e=>e.classList.remove('show'));
}
function openModalById(id){ buildOverlay(id); render2(()=>{ showScrim(); $("#modal-"+id)?.classList.add('show'); }); }
function openPanel(id){ buildOverlay('entity', id); render2(()=>{ showScrim(); $("#panel-entity").classList.add('show'); }); }
function openSheet(id){ buildOverlay(id); render2(()=>{ showScrim(); $("#sheet-"+id)?.classList.add('show'); }); }
/* re-render overlays only then run cb */
function render2(cb){ const host=document.createElement('div'); host.innerHTML=overlays();
  const cont=$("#app"); // replace overlay nodes
  ['#scrim','#panel-entity','#modal-expense','#modal-doc','#modal-invite','#modal-role','#modal-category','#modal-fx','#modal-warnings','#modal-prolock','#modal-create','#modal-telegram','#sheet-share','#sheet-lensmenu'].forEach(sel=>{ const old=$(sel); if(old) old.remove(); });
  while(host.firstChild) cont.appendChild(host.firstChild);
  cb&&cb();
}

/* ================== PROTOTYPE CHROME WIRING ================== */
function buildJumpMenu(){
  const menu=$("#jumpMenu");
  menu.innerHTML = SCREENS.map(g=>`<div class="grp">${g.grp}</div>`+g.items.map(it=>`<button class="item ${App.screen===it[0]?'cur':''}" onclick="jump('${it[0]}')"><i>${it[2]}</i>${it[1]}</button>`).join('')).join('');
}
function jump(id){ go(id); }
function closeJump(){ $("#jumpMenu").classList.remove('open'); }
$("#jumpBtn").onclick = (e)=>{ e.stopPropagation(); buildJumpMenu(); $("#jumpMenu").classList.toggle('open'); };
document.addEventListener('click',()=>closeJump());
$("#jumpMenu").onclick = e=>e.stopPropagation();
$("#viewseg").onclick = e=>{ const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#viewseg button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
  const vp=b.dataset.vp; App.vp=vp; $("#stage").classList.toggle('phone', vp==='phone');
  document.body.classList.toggle('vp-phone', vp==='phone');
  document.querySelector('#proto').classList.toggle('mobile', vp==='phone'); render();
};

/* ================== SCREEN REGISTRY ================== */
const SC = {};

/* ====== DOSSIER (persistent trip context rail) ====== */
function dossier(){
  const pct = Math.round(TRIP.budget.spent/TRIP.budget.planned*100);
  return `<aside class="dossier">
    <div class="card" style="overflow:hidden">
      <div style="height:104px;background:linear-gradient(120deg,var(--blue-600),var(--teal));position:relative">
        <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(13,18,32,.5))"></div>
        <div style="position:absolute;left:14px;bottom:11px;color:#fff">
          <div style="font-family:var(--display);font-weight:700;font-size:16px">${TRIP.title}</div>
          <div class="mono" style="font-size:11.5px;opacity:.9">${TRIP.dates}</div>
        </div>
        <span class="chip" style="position:absolute;top:11px;right:11px;background:rgba(255,255,255,.9);border:none">● Upcoming</span>
      </div>
      <div class="pad" style="padding:14px">
        <div class="row" style="justify-content:space-between">
          <div class="row g8"><div class="av-stack">${TRIP.members.slice(0,3).map(m=>av(m,28)).join('')}</div><span class="f12 txt-mut">+1 invited</span></div>
          <button class="btn btn-soft btn-sm" onclick="openPanel('member')">Manage</button>
        </div>
      </div>
    </div>

    <div class="card pad">
      <div class="between" style="margin-bottom:10px"><div class="f13 fw7">Route</div><span class="f12 txt-mut">${TRIP.cities.length} cities · ${TRIP.nights}n</span></div>
      ${TRIP.cities.map((c,i)=>`<div class="row g10" style="padding:5px 0">
        <div style="width:22px;height:22px;border-radius:7px;background:${c.color};color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700">${i+1}</div>
        <div style="flex:1"><div class="f13 fw6">${c.name} <span class="f12 txt-mut">${c.cc}</span></div></div>
        <span class="f12 mono txt-mut">${c.nights||'—'}n</span>
        ${!c.transferOk?'<span class="tag deadline" title="No transfer">⚠</span>':''}
      </div>`).join('')}
    </div>

    <div class="card pad">
      <div class="between" style="margin-bottom:8px"><div class="f13 fw7">Budget</div><a class="link f12" onclick="go('budget')">Open ›</a></div>
      <div class="statnum" style="font-size:26px">${M(TRIP.budget.spent)}</div>
      <div class="f12 txt-mut" style="margin:2px 0 9px">spent of ${M(TRIP.budget.planned)} planned</div>
      <div class="meter"><i style="width:${pct}%"></i></div>
      <div class="row g6 mt8"><span class="tag success">€620 under plan</span><span class="f12 txt-mut mono">EUR · live FX</span></div>
    </div>

    <div class="card pad" style="cursor:pointer" onclick="openModalById('warnings')">
      <div class="row g10"><div class="icotile amber" style="width:38px;height:38px">!</div>
      <div style="flex:1"><div class="f13 fw7">${TRIP.warnings.length} things need attention</div><div class="f12 txt-mut">Transfers, hotels, deadlines</div></div><span class="txt-mut">›</span></div>
    </div>

    <div class="card pad">
      <div class="f13 fw7" style="margin-bottom:10px">Services</div>
      <div class="row wrap g8">
        <span class="chip">🚗 1 car</span><span class="chip">📶 2 eSIM</span><span class="chip">🛡 1 insurance</span>
      </div>
    </div>
  </aside>`;
}

/* ============================================================
   OVERVIEW — new primary trip screen (info + stats)
   ============================================================ */
SC.overview = () => `<div class="canvas">
  <div class="col g16">
    <!-- HERO -->
    <div class="card" style="overflow:hidden;border:none">
      <div style="height:188px;background:linear-gradient(125deg,var(--blue-700),var(--blue-500) 45%,var(--teal));position:relative">
        <div style="position:absolute;inset:0;background:radial-gradient(900px 300px at 80% -20%,rgba(255,255,255,.25),transparent),linear-gradient(180deg,transparent 40%,rgba(13,18,32,.6))"></div>
        <div style="position:absolute;top:16px;left:18px;display:flex;gap:8px">
          <span class="chip" style="background:rgba(255,255,255,.92);border:none;font-weight:700">● Upcoming · in 9 days</span>
          <span class="tag pro" style="font-size:11px">✦ PRO</span>
        </div>
        <div style="position:absolute;top:14px;right:16px;display:flex;gap:8px">
          <button class="btn btn-sm" style="background:rgba(255,255,255,.92)" onclick="go('structure')">✎ Edit trip</button>
          <button class="btn btn-sm" style="background:rgba(255,255,255,.92)" onclick="openSheet('share')">↗ Share</button>
        </div>
        <div style="position:absolute;left:20px;bottom:16px;color:#fff;right:20px">
          <h1 style="font-size:32px;color:#fff;margin-bottom:6px">${TRIP.title}</h1>
          <div class="row g12 f13" style="opacity:.95">
            <span class="mono">${TRIP.dates}</span><span style="opacity:.5">·</span>
            <span>${TRIP.origin} → ${TRIP.cities.map(c=>c.name).join(' → ')}</span>
          </div>
        </div>
      </div>
      <div class="pad row between wrap" style="gap:14px">
        <div class="row g8"><div class="av-stack">${TRIP.members.map(m=>av(m,32)).join('')}</div>
          <div class="col"><span class="f13 fw6">3 going · 1 invited</span><span class="f12 txt-mut">You, Marta, Iván</span></div></div>
        <div class="row g8">
          <button class="btn btn-ghost btn-sm" onclick="go('chat')">◗ Chat</button>
          <button class="btn btn-ghost btn-sm" onclick="openPanel('aiparse')">✦ Ask Triplanio</button>
          <button class="btn btn-primary btn-sm" onclick="openSheet('lensmenu')">＋ Add to trip</button>
        </div>
      </div>
    </div>

    <!-- STAT BAND -->
    <div class="card pad">
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;text-align:center" id="statband">
        ${[['12','days','blue'],['9','nights','teal'],['4','cities','coral'],['3','hotels','teal'],['5','transfers','blue'],['14','activities','coral']].map(s=>`
          <div style="padding:6px 4px"><div class="statnum" style="font-size:28px;color:var(--${s[2]==='blue'?'brand':s[2]})">${s[0]}</div><div class="f12 txt-mut" style="margin-top:3px">${s[1]}</div></div>`).join('')}
      </div>
      <div style="height:1px;background:var(--line);margin:14px 0"></div>
      <div class="row between wrap g12">
        <div class="row g16">
          <div><div class="f12 txt-mut">Booked</div><div class="row g8" style="margin-top:4px"><div class="meter" style="width:120px"><i style="width:74%;background:var(--green)"></i></div><span class="f13 fw7">74%</span></div></div>
          <div><div class="f12 txt-mut">Distance</div><div class="f14 fw7 mono" style="margin-top:4px">2,140 km</div></div>
          <div><div class="f12 txt-mut">Currencies</div><div class="f14 fw7 mono" style="margin-top:4px">EUR · GBP</div></div>
        </div>
        <span class="tag success">On track</span>
      </div>
    </div>

    <!-- NEEDS ATTENTION -->
    <div class="card pad">
      <div class="sec-head" style="margin-bottom:12px"><h2>Needs attention</h2><a class="link" onclick="openModalById('warnings')">View all ${TRIP.warnings.length} ›</a></div>
      <div class="col g8">
        ${TRIP.warnings.slice(0,3).map(w=>`<div class="row g12" style="padding:11px 12px;border:1px solid var(--line);border-radius:12px;cursor:pointer" onclick="go('${w.to}')">
          <div class="icotile ${w.sev}" style="width:36px;height:36px">${w.kind==='deadline'?'⏰':w.kind==='hotel'?'🛏':w.kind==='act'?'◐':'✈'}</div>
          <div style="flex:1"><div class="f13 fw6">${w.t}</div><div class="f12 txt-mut">${w.d}</div></div>
          <button class="btn btn-soft btn-sm">Fix</button>
        </div>`).join('')}
      </div>
    </div>
