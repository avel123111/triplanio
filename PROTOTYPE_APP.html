<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triplanio — прототип</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#2167e2;--brand-600:#1b58c4;--brand-700:#174aa6;--brand-soft:rgba(33,103,226,.08);--brand-soft-12:rgba(33,103,226,.12);--brand-ink:#0b1f47;--brand-glow:rgba(33,103,226,.10);
  --warm:#c9603a;--warm-tint:rgba(201,96,58,.10);--success:#1f8a5b;--success-soft:rgba(31,138,91,.10);--danger:#c4364c;--danger-soft:rgba(196,54,76,.10);--warning:#c98a1a;--warning-soft:rgba(201,138,26,.12);--warning-ink:#8a5d12;--ai:#6a3ee2;--ai-soft:rgba(106,62,226,.08);
  --ink:#0F172A;--ink-2:#1f2a44;--muted:#5a657a;--muted-2:#8693a8;--line:#E5E7EB;--line-2:#eef0f4;--line-hover:#dbe1ec;--wash:#F7F8FA;--surface:#fff;
  --radius-card:18px;--radius-btn:12px;--radius-sm:10px;--pill:999px;
  --shadow-soft:0 1px 2px rgba(15,23,42,.04),0 6px 24px -8px rgba(15,23,42,.08);
  --shadow-card:0 1px 2px rgba(15,23,42,.03),0 10px 30px -12px rgba(15,23,42,.14);
  --shadow-pop:0 2px 6px rgba(15,23,42,.06),0 20px 60px -20px rgba(15,23,42,.22);
  --fdisp:"Inter Tight","Inter",system-ui,sans-serif;--fbody:"Inter",system-ui,sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
:root[data-theme="dark"]{
  --brand:#5a8ff0;--brand-600:#7aa5f4;--brand-soft:rgba(90,143,240,.14);--brand-soft-12:rgba(90,143,240,.20);--brand-glow:rgba(90,143,240,.16);
  --warm:#e08158;--warm-tint:rgba(224,129,88,.14);--success:#4ab98a;--success-soft:rgba(74,185,138,.16);--danger:#e5687a;--danger-soft:rgba(229,104,122,.16);--warning:#e0a64b;--warning-soft:rgba(224,166,75,.16);--warning-ink:#e8b766;--ai:#9c7af0;--ai-soft:rgba(156,122,240,.14);
  --ink:#e8edf5;--ink-2:#c9d1de;--muted:#8693a8;--muted-2:#6a778c;--line:#232a3a;--line-2:#1a202d;--line-hover:#2f3a4e;--wash:#0e131c;--surface:#131923;
  --shadow-soft:0 1px 2px rgba(0,0,0,.5),0 6px 24px -8px rgba(0,0,0,.55);--shadow-card:0 1px 2px rgba(0,0,0,.5),0 10px 30px -12px rgba(0,0,0,.6);--shadow-pop:0 2px 6px rgba(0,0,0,.55),0 20px 60px -20px rgba(0,0,0,.7);
}
*{box-sizing:border-box}html,body{margin:0}
body{font-family:var(--fbody);background:var(--wash);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv11"}
.disp{font-family:var(--fdisp)}.num{font-variant-numeric:tabular-nums}.muted{color:var(--muted)}.mut2{color:var(--muted-2)}
h1,h2,h3{font-family:var(--fdisp);margin:0;letter-spacing:-.022em;font-weight:600;color:var(--ink)}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
svg{display:block}
.eyebrow{font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted-2);font-weight:600}
.ic{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}

/* ---- buttons ---- */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--radius-btn);font-weight:600;font-size:14px;color:var(--ink-2);transition:.18s var(--ease);white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn .ic{width:17px;height:17px}
.btn--pri{background:var(--brand);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 8px 18px -8px color-mix(in oklab,var(--brand) 60%,transparent)}
.btn--pri:hover{background:var(--brand-600);transform:translateY(-1px)}
.btn--ghost{border:1px solid var(--line);background:var(--surface)}
.btn--ghost:hover{background:var(--wash);border-color:var(--line-hover)}
.btn--quiet{color:var(--muted)}.btn--quiet:hover{background:var(--wash);color:var(--ink)}
.btn--sm{padding:7px 12px;font-size:13px}
.iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:var(--muted);transition:.18s var(--ease)}
.iconbtn:hover{background:var(--wash);color:var(--ink)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:var(--pill);font-size:12.5px;font-weight:600;background:var(--brand-soft);color:var(--brand)}
.tag{padding:2px 9px;border-radius:var(--pill);font-size:11px;font-weight:600}
.tag--flight{background:var(--brand-soft);color:var(--brand)}.tag--hotel{background:var(--success-soft);color:var(--success)}.tag--act{background:var(--warm-tint);color:var(--warm)}.tag--deadline{background:var(--danger-soft);color:var(--danger)}.tag--ai{background:var(--ai-soft);color:var(--ai)}

/* ============ SHELL ============ */
.app{display:grid;grid-template-columns:232px 1fr;grid-template-rows:64px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--fdisp);font-weight:600;font-size:17px;letter-spacing:-.02em}
.brand__m{width:28px;height:28px;border-radius:8px;background:var(--brand);display:grid;place-items:center;color:#fff}
.crumb{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--muted)}
.crumb b{color:var(--ink-2);font-weight:600}
.crumb .dates{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.tb-sp{flex:1}
.tb-act{display:flex;align-items:center;gap:6px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2167e2,#6a3ee2);color:#fff;display:grid;place-items:center;font-weight:600;font-size:13px}
.tb-mobtoggle{display:none}

.nav{background:var(--surface);border-right:1px solid var(--line);padding:14px 12px;overflow-y:auto;position:sticky;top:64px;height:calc(100vh - 64px)}
.nav__grp{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);padding:14px 10px 6px;font-weight:600}
.nav__grp:first-child{padding-top:2px}
.nav__i{display:flex;align-items:center;gap:11px;width:100%;padding:9px 11px;border-radius:10px;color:var(--ink-2);font-size:14px;font-weight:500;text-align:left;transition:.15s var(--ease)}
.nav__i:hover{background:var(--wash)}
.nav__i.on{background:var(--brand-soft);color:var(--brand)}
.nav__i .ic{width:18px;height:18px}
.nav__i .cnt{margin-left:auto;min-width:18px;height:18px;padding:0 5px;border-radius:var(--pill);background:var(--warm);color:#fff;font-size:11px;font-weight:600;display:grid;place-items:center}
.nav__i.on .cnt{background:var(--brand)}
.nav__up{margin-top:14px;padding:13px;border-radius:14px;background:linear-gradient(160deg,var(--brand-soft),var(--ai-soft));border:1px solid var(--brand-soft-12)}
.nav__up h4{font-size:13.5px;margin:0 0 3px}.nav__up p{font-size:12px;color:var(--muted);margin:0 0 10px;line-height:1.45}

.main{padding:26px 30px 60px;min-width:0;overflow-x:clip}
.page{max-width:1180px;margin:0 auto}
.with-rail{display:grid;grid-template-columns:minmax(0,1fr) 336px;gap:28px;align-items:start}

/* page header */
.ph{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px}
.ph h1{font-size:30px;line-height:1.1}
.ph .sub{color:var(--muted);font-size:14px;margin-top:4px}
.ph .sp{flex:1}
.tabs{display:inline-flex;gap:3px;padding:4px;background:var(--wash);border:1px solid var(--line);border-radius:12px}
.tab{padding:7px 13px;border-radius:9px;font-size:13.5px;font-weight:500;color:var(--muted);transition:.15s}
.tab.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(15,23,42,.08)}
.field{display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--surface);border:1px solid var(--line);border-radius:11px;color:var(--muted);font-size:14px}
.field input{border:none;background:none;outline:none;color:var(--ink);font:inherit;width:100%}

/* card */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-card);box-shadow:var(--shadow-soft)}
.card--pad{padding:20px}
.card-h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.card-h h3{font-size:16px;flex:1}

/* ===== Trips collection ===== */
.tripgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.tripcard{border-radius:var(--radius-card);overflow:hidden;border:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow-soft);cursor:pointer;transition:.2s var(--ease)}
.tripcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-card);border-color:var(--line-hover)}
.tripcard__cv{height:130px;background-size:cover;background-position:center;position:relative}
.tripcard__cv::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,31,71,.05),rgba(11,31,71,.42))}
.tripcard__b{padding:14px 16px}
.tripcard__t{font-family:var(--fdisp);font-weight:600;font-size:16px;letter-spacing:-.01em}
.tripcard__m{font-size:12.5px;color:var(--muted);margin-top:3px;font-variant-numeric:tabular-nums}
.tripcard__c{font-size:12.5px;color:var(--muted-2);margin-top:8px;display:flex;align-items:center;gap:6px}
.tripcard--new{border:1.5px dashed var(--line);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);min-height:200px}
.tripcard--new:hover{border-color:var(--brand);color:var(--brand)}

/* ===== Timeline ===== */
.triphero{border-radius:var(--radius-card);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow-card);margin-bottom:22px;position:relative;height:188px;background-size:cover;background-position:center}
.triphero::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(11,31,71,.66),rgba(11,31,71,.18) 60%),linear-gradient(0deg,rgba(11,31,71,.5),transparent 55%)}
.triphero__b{position:absolute;left:24px;bottom:18px;right:24px;z-index:2;color:#fff;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.triphero__t{font-family:var(--fdisp);font-weight:600;font-size:30px;letter-spacing:-.02em;line-height:1.05}
.triphero__m{font-size:13px;opacity:.92;margin-top:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.triphero__m .dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.6}
.triphero__act{display:flex;gap:8px}
.triphero__act .btn--ghost{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.28);color:#fff;backdrop-filter:blur(6px)}
.triphero__act .btn--ghost:hover{background:rgba(255,255,255,.26)}
.triphero__act .btn--pri{background:#fff;color:var(--brand-ink)}

.daygroup{margin-bottom:8px}
.dayhead{display:flex;align-items:center;gap:11px;margin:24px 0 12px}
.dayhead .d{font-family:var(--fdisp);font-weight:600;font-size:16px}
.dayhead .w{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);font-weight:600}
.dayhead .city{margin-left:auto;font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.dayhead .city .ic{width:14px;height:14px;color:var(--warm)}
.dayhead .ln{flex:1;height:1px;background:var(--line-2)}

.row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:.16s var(--ease)}
.row:hover{border-color:var(--line-hover);box-shadow:var(--shadow-soft)}
.row__ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex:0 0 36px}
.row__ic.f{background:var(--brand-soft);color:var(--brand)}.row__ic.h{background:var(--success-soft);color:var(--success)}.row__ic.a{background:var(--warm-tint);color:var(--warm)}.row__ic.d{background:var(--danger-soft);color:var(--danger)}.row__ic.c{background:var(--success-soft);color:var(--success)}
.row__t{font-weight:600;font-size:14px}.row__t b{font-weight:600}
.row__s{font-size:12.5px;color:var(--muted);margin-top:2px}
.row__time{margin-left:auto;font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:500;text-align:right;flex:0 0 auto}
.row__price{font-weight:600;font-variant-numeric:tabular-nums;font-size:14px}
.warnrow{display:flex;align-items:center;gap:11px;padding:11px 14px;border-radius:var(--radius-sm);background:var(--warning-soft);border:1px dashed var(--warning);color:var(--warning-ink);font-size:13px;font-weight:500;margin-bottom:7px}
.warnrow .ic{color:var(--warning-ink);width:18px;height:18px}
.warnrow .btn{margin-left:auto;color:var(--warning-ink)}
.emptyday{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);color:var(--muted-2);font-size:12.5px;margin-bottom:7px}
.emptyday .ic{width:15px;height:15px}

/* context rail dossier */
.dossier .cv{height:108px;background-size:cover;background-position:center;position:relative}
.dossier .cv::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,31,71,.05),rgba(11,31,71,.5))}
.dossier .cvb{position:absolute;left:14px;bottom:11px;z-index:2;color:#fff}
.dossier .cvb .t{font-family:var(--fdisp);font-weight:600;font-size:17px}
.dossier .cvb .d{font-size:11.5px;opacity:.9;font-variant-numeric:tabular-nums}
.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:13px}
.kv:last-child{border-bottom:none}.kv .v{font-weight:600;font-variant-numeric:tabular-nums}
.sect{padding:14px 16px;border-top:1px solid var(--line-2)}
.sect:first-child{border-top:none}
.bign{font-family:var(--fdisp);font-weight:600;font-size:24px;font-variant-numeric:tabular-nums}
.meter{height:9px;border-radius:var(--pill);background:var(--wash);display:flex;overflow:hidden;margin:11px 0 9px;gap:1.5px}
.meter i{height:100%}
.legend{display:flex;flex-wrap:wrap;gap:8px 14px;font-size:11.5px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:6px}.legend .sw{width:9px;height:9px;border-radius:50%}
.who{display:flex;align-items:center;gap:9px;font-size:13px;padding:6px 0}
.who .a{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:600;flex:0 0 28px}
.who .role{margin-left:auto;font-size:11.5px;color:var(--muted-2)}
.warnpill{display:flex;align-items:center;gap:9px;width:100%;padding:11px 14px;border-radius:12px;background:var(--warning-soft);color:var(--warning-ink);font-size:13px;font-weight:600;text-align:left}
.warnpill .ic{width:18px;height:18px}.warnpill .cnt{margin-left:auto;background:var(--warning-ink);color:#fff;border-radius:var(--pill);min-width:20px;height:20px;display:grid;place-items:center;font-size:11px}

/* budget master-detail */
.stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.statc{padding:16px}.statc .l{font-size:12.5px;color:var(--muted)}.statc .b{font-family:var(--fdisp);font-weight:600;font-size:26px;margin-top:6px;font-variant-numeric:tabular-nums}
.md{display:grid;grid-template-columns:300px 1fr;gap:16px}
.catrow{display:flex;align-items:center;gap:11px;padding:12px 13px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:var(--surface);cursor:pointer;transition:.15s}
.catrow:hover{border-color:var(--line-hover)}.catrow.on{border-color:var(--brand);background:var(--brand-soft)}
.catrow .sw{width:10px;height:10px;border-radius:50%;flex:0 0 10px}
.catrow .nm{font-weight:500;font-size:13.5px}.catrow .am{margin-left:auto;font-weight:600;font-variant-numeric:tabular-nums;font-size:13.5px}

/* calendar */
.cal{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--surface)}
.cal .hd{display:grid;grid-template-columns:repeat(7,1fr)}
.cal .hd>div{padding:9px;font-size:11px;color:var(--muted-2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--line-2)}
.cal .bd{display:grid;grid-template-columns:repeat(7,1fr)}
.cal .c{min-height:78px;border-right:1px solid var(--line-2);border-bottom:1px solid var(--line-2);padding:6px;font-size:12px;color:var(--muted)}
.cal .c .bar{font-size:10.5px;color:#fff;border-radius:5px;padding:2px 6px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* map */
.maparea{height:440px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background-size:cover;background-position:center;position:relative;display:grid;place-items:center}
.maparea .lbl{background:rgba(11,31,71,.55);color:#fff;padding:9px 16px;border-radius:var(--pill);font-size:13px;backdrop-filter:blur(4px)}
.routelist .ri{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line-2)}
.routelist .ri:last-child{border-bottom:none}
.routelist .n{width:24px;height:24px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;font-size:12px;font-weight:600;flex:0 0 24px}
.routelist .nm{font-weight:600;font-size:13.5px}.routelist .s{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}

/* chat */
.chatwrap{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:16px;height:calc(100vh - 64px - 86px)}
.chatmain{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:14px;background:var(--surface);overflow:hidden}
.chatmsgs{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:74%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.45}
.msg.me{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:5px}
.msg.them{align-self:flex-start;background:var(--wash);border:1px solid var(--line);border-bottom-left-radius:5px}
.msg.ai{align-self:flex-start;background:var(--ai-soft);border:1px solid var(--ai-soft);border-bottom-left-radius:5px}
.msg .who{font-size:11px;font-weight:600;margin-bottom:3px;opacity:.8;padding:0}
.composer{display:flex;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid var(--line)}
.composer .field{flex:1}

/* structure editor */
.rt{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
.rt:hover{border-color:var(--line-hover);box-shadow:var(--shadow-soft)}
.rt .h{color:var(--muted-2);cursor:grab}
.rt .n{width:26px;height:26px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;font-weight:600;font-size:12px;flex:0 0 26px}
.rt .nm{font-weight:600;font-size:14px}.rt .s{font-size:12px;color:var(--muted)}
.rt .ni{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}
.seam{display:flex;align-items:center;gap:9px;padding:3px 0 3px 40px;color:var(--success);font-size:12.5px;font-weight:600}
.seam .ic{width:15px;height:15px}
.seam.warn{color:var(--warning-ink)}

/* members / settings rows */
.mrow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line-2)}
.mrow:last-child{border-bottom:none}
.toggle{width:42px;height:24px;border-radius:var(--pill);background:var(--line);position:relative;transition:.18s;flex:0 0 42px}
.toggle.on{background:var(--brand)}.toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 2px rgba(0,0,0,.2)}.toggle.on::after{left:20px}
.srow{display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--line-2)}
.srow:last-child{border-bottom:none}.srow .ic-tile{width:38px;height:38px;border-radius:10px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex:0 0 38px}
.srow .t{font-weight:600;font-size:14px}.srow .s{font-size:12.5px;color:var(--muted);margin-top:2px}

/* empty */
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .ic{width:30px;height:30px;margin:0 auto 12px;color:var(--muted-2)}
.empty h3{font-size:15px;margin-bottom:5px}.empty p{font-size:13.5px;max-width:30ch;margin:0 auto 16px}

/* Pro */
.plans{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:760px;margin:0 auto}
.plan{padding:24px;border:2px solid var(--line);border-radius:18px;background:var(--surface);position:relative}
.plan.on{border-color:var(--brand);background:var(--brand-soft)}
.plan .pop{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--brand);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:var(--pill)}
.plan .nm{font-family:var(--fdisp);font-weight:600;font-size:19px}.plan .pr{font-family:var(--fdisp);font-weight:600;font-size:38px;margin:10px 0 2px;font-variant-numeric:tabular-nums}
.plan ul{list-style:none;padding:0;margin:16px 0 0;display:flex;flex-direction:column;gap:9px;font-size:13.5px}
.plan li{display:flex;gap:9px;align-items:flex-start}.plan li .ic{width:17px;height:17px;color:var(--success);flex:0 0 17px;margin-top:1px}

/* ===== detail panel / bottom sheet ===== */
.scrim{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.22s var(--ease);z-index:50}
.scrim.on{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;right:0;height:100vh;width:440px;max-width:94vw;background:var(--surface);border-left:1px solid var(--line);box-shadow:var(--shadow-pop);transform:translateX(102%);transition:transform .3s var(--ease);z-index:60;display:flex;flex-direction:column}
.panel.on{transform:none}
.panel__cv{height:150px;background-size:cover;background-position:center;position:relative;flex:0 0 150px}
.panel__cv::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,31,71,.15),rgba(11,31,71,.62))}
.panel__x{position:absolute;top:13px;right:13px;z-index:3;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;display:grid;place-items:center;backdrop-filter:blur(6px)}
.panel__cap{position:absolute;left:20px;bottom:14px;z-index:2;color:#fff}
.panel__k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;opacity:.92}
.panel__t{font-family:var(--fdisp);font-weight:600;font-size:23px;margin-top:4px}
.panel__b{flex:1;overflow:auto;padding:20px}
.grip{display:none}
.prow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line-2);font-size:13.5px}
.prow:last-child{border-bottom:none}.prow .k{color:var(--muted)}.prow .v{font-weight:600;font-variant-numeric:tabular-nums}
.psec{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);font-weight:700;margin:18px 0 8px}
.pdoc{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--surface);font-size:13px}
.pdoc .ic-tile{width:36px;height:36px;border-radius:9px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex:0 0 36px}
.panel__foot{padding:13px 18px;border-top:1px solid var(--line);display:flex;gap:10px;background:var(--wash)}
.panel__foot .btn{flex:1;justify-content:center}

/* AI surface */
.aibox{border-radius:13px;padding:13px 15px;background:var(--ai-soft);border:1px solid var(--ai-soft);margin-bottom:8px;position:relative}
.aibox .h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ai)}
.aidots i{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--ai);margin:0 1px;animation:bl 1.2s infinite}
.aidots i:nth-child(2){animation-delay:.15s}.aidots i:nth-child(3){animation-delay:.3s}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* mobile bottom nav + FAB */
.mobnav{display:none}
.fab{display:none}

/* ========= controls (prototype) ========= */
.ctl{position:fixed;right:18px;bottom:18px;z-index:80;display:flex;gap:8px;align-items:center}
.ctl .seg{display:inline-flex;padding:4px;border-radius:var(--pill);background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-pop)}
.ctl .seg button{padding:6px 12px;border-radius:var(--pill);font-size:12.5px;font-weight:600;color:var(--muted)}
.ctl .seg button.on{background:var(--ink);color:var(--surface)}

/* ============ RESPONSIVE / MOBILE ============ */
body.mob .app{grid-template-columns:1fr;width:402px;margin:18px auto;min-height:860px;height:860px;border-radius:30px;overflow:hidden;box-shadow:var(--shadow-pop);border:1px solid var(--line);position:relative}
body.mob{background:#c9 cccf;background:#cbd0d8}
:root[data-theme="dark"] body.mob{background:#05080d}
body.mob .nav{display:none}
body.mob .topbar{grid-column:1;padding:0 16px;height:56px}
body.mob .crumb .dates{display:none}
body.mob .tb-mobtoggle{display:grid}
body.mob .main{grid-column:1;padding:16px 16px 86px;overflow-y:auto;height:calc(860px - 56px)}
body.mob .with-rail{grid-template-columns:1fr}
body.mob .with-rail .rail{order:-1}
body.mob .stat3{grid-template-columns:1fr 1fr}
body.mob .md{grid-template-columns:1fr}
body.mob .chatwrap{grid-template-columns:1fr;height:auto}
body.mob .chatwrap .chatside{display:none}
body.mob .plans{grid-template-columns:1fr}
body.mob .triphero__t{font-size:24px}
body.mob .ph h1{font-size:24px}
body.mob .mobnav{display:flex;position:absolute;left:0;right:0;bottom:0;height:64px;background:var(--surface);border-top:1px solid var(--line);z-index:40;padding:6px 6px env(safe-area-inset-bottom)}
body.mob .mobnav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:10px;font-weight:600;border-radius:10px}
body.mob .mobnav button.on{color:var(--brand)}
body.mob .mobnav .ic{width:21px;height:21px}
body.mob .fab{display:grid;position:absolute;right:16px;bottom:80px;width:52px;height:52px;border-radius:50%;background:var(--brand);color:#fff;place-items:center;box-shadow:0 10px 24px -8px color-mix(in oklab,var(--brand) 60%,transparent);z-index:41}
/* mobile: panel becomes bottom sheet */
body.mob .scrim{position:absolute}
body.mob .panel{position:absolute;top:auto;bottom:0;right:0;left:0;width:100%;max-width:100%;height:auto;max-height:88%;border-left:none;border-top:1px solid var(--line);border-radius:22px 22px 0 0;transform:translateY(102%)}
body.mob .panel.on{transform:none}
body.mob .panel .grip{display:block;width:38px;height:4px;border-radius:var(--pill);background:var(--line);margin:9px auto 2px}
body.mob .panel__cv{height:120px;flex-basis:120px}

/* natural narrow fallback */
@media(max-width:900px){
  body:not(.mob) .app{grid-template-columns:1fr}
  body:not(.mob) .nav{display:none}
  body:not(.mob) .with-rail{grid-template-columns:1fr}
  body:not(.mob) .md{grid-template-columns:1fr}
}
</style>
</head>

<script>
const root=document.documentElement, main=document.getElementById('main');
const T={brand:'var(--brand)'};
// ---- monoline icon helper (reuse from nav set) ----
function ic(p,s=18){return `<svg class="ic" viewBox="0 0 24 24" style="width:${s}px;height:${s}px">${p}</svg>`;}
const I={
 plane:'<path d="M21 12.5 3 18l4-5-4-5 18 5.5a.5.5 0 0 1 0 1z"/>',

 check:'<path d="m5 12 4.5 4.5L19 7"/>',

 arrow:'<path d="M5 12h14M13 6l6 6-6 6"/>', warn:'<path d="M12 3 2 20h20z"/><path d="M12 10v4M12 17.5v.2"/>',
 pin:'<path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/>',
 doc:'<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/>',
 plus:'<path d="M12 5v14M5 12h14"/>', clock:'<circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/>',

};

// ===== context rail (persistent trip dossier) =====
function rail(){return `<aside class="rail"><div class="card dossier">

    <div style="display:flex;align-items:baseline;gap:10px;margin-top:6px"><span class="bign">€4 480</span><span style="font-size:12px;color:var(--success);background:var(--success-soft);padding:2px 8px;border-radius:999px;font-weight:600">−€180 от плана</span></div>

// ===== timeline =====
function evRow(cls,icn,t,s,right){return `<div class="row" onclick="openPanel('${cls}')"><div class="row__ic ${cls[0]}">${ic(icn,18)}</div><div style="min-width:0"><div class="row__t">${t}</div><div class="row__s">${s}</div></div>${right}</div>`;}
const SCREENS={
 timeline:()=>`<div class="page with-rail"><div>
   <div class="triphero" style="background-image:url('${COVER}')"><div class="triphero__b">
     <div><div class="triphero__t">Иберия летом</div><div class="triphero__m"><span>28 мая → 7 июня</span><span class="dot"></span><span>3 города</span><span class="dot"></span><span>4 участника</span><span class="dot"></span><span>≈28°</span></div></div>
     <div class="triphero__act"><button class="btn btn--pri btn--sm">Редактировать</button><button class="iconbtn" style="color:#fff">${ic(I.arrow,17)}</button></div>
   </div></div>
   <div class="dayhead"><span class="d">28 мая</span><span class="w">Сб</span><span class="city">${ic(I.pin,14)} Лиссабон</span><span class="ln"></span></div>
   <div class="warnrow">${ic(I.warn,18)} Нет переезда · Москва → Лиссабон <button class="btn btn--sm">Добавить</button></div>
   ${evRow('flight',I.plane,'<b>LHR → LIS</b> · British Airways 503','Прилёт · терминал 1','<span class="row__time">10:25</span>')}
   ${evRow('hotel',I.bed,'<b>Memmo Alfama</b> · заезд','2 ночи · Rua dos Remédios 12','<span class="row__price">€240</span><span class="row__time" style="margin-left:12px">15:00</span>')}
   ${evRow('act',I.act,'<b>Time Out Market</b>','Ужин · бронь на 4','<span class="row__time">19:30</span>')}
   <div class="dayhead"><span class="d">29 мая</span><span class="w">Вс</span><span class="city">${ic(I.pin,14)} Лиссабон</span><span class="ln"></span></div>
   ${evRow('deadline',I.flag,'<b>Бесплатная отмена Memmo</b>','После — штраф за первую ночь','<span class="row__time">23:59</span>')}
   <div class="emptyday">${ic(I.clock,15)} Свободный день — добавь активность</div>

 warn:{cv:COVER,k:'Что требует внимания',t:'2 предупреждения',b:`<div class="card">${['Нет переезда · Москва → Лиссабон','Нет переезда · Порту → Барселона'].map(w=>`<div class="mrow" style="cursor:pointer"><span class="ic-tile" style="background:var(--warning-soft);color:var(--warning-ink)">${ic(I.warn,18)}</span><div style="flex:1;font-size:14px">${w}</div>${ic(I.chev,16)}</div>`).join('')}</div>`},
};

// ===== router & interactions =====
const LENS=['timeline','map','calendar','budget','docs','chat','structure','members','settings','share'];
function go(s){
  if(!SCREENS[s])s='timeline';
  main.innerHTML=SCREENS[s]();
  main.scrollTop=0;
  document.querySelectorAll('.nav__i').forEach(b=>b.classList.toggle('on',b.dataset.go===s));
  document.querySelectorAll('.mobnav button').forEach(b=>b.classList.toggle('on',b.dataset.go===s));
  document.getElementById('crumb').style.display=LENS.includes(s)?'flex':'none';
}
document.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',()=>go(b.dataset.go)));

function openPanel(kind){const d=PANELS[kind]||PANELS.hotel;
  document.getElementById('panelInner').innerHTML=`<div class="panel__cv" style="background-image:url('${d.cv}')"><button class="panel__x" onclick="closePanel()">${ic(I.x,16)}</button><div class="panel__cap"><div class="panel__k">${d.k}</div><div class="panel__t">${d.t}</div></div></div><div class="panel__b">${d.b}</div><div class="panel__foot"><button class="btn btn--ghost" onclick="closePanel()">Закрыть</button><button class="btn btn--pri">Редактировать</button></div>`;
  document.getElementById('panel').classList.add('on');document.getElementById('scrim').classList.add('on');}
function openSheet(kind){
  let inner='';
  if(kind==='more'){inner=`<div class="panel__b" style="padding-top:16px"><div class="psec" style="margin-top:0">Линзы и управление</div>${['calendar:Календарь','docs:Документы','structure:Структура','members:Участники','settings:Настройки','share:Поделиться'].map(x=>{const[g,n]=x.split(':');return `<button class="nav__i" style="font-size:15px;padding:12px" onclick="go('${g}');closePanel()">${n}</button>`}).join('')}</div>`;}
  else{inner=`<div class="panel__b" style="padding-top:16px"><div class="psec" style="margin-top:0">Добавить</div>${['Перелёт или поезд','Отель','Активность','Аренда авто','Трату','Документ'].map(n=>`<button class="nav__i" style="font-size:15px;padding:12px" onclick="closePanel()">${ic(I.plus,17)} ${n}</button>`).join('')}</div>`;}
  document.getElementById('panelInner').innerHTML=inner;
  document.getElementById('panel').classList.add('on');document.getElementById('scrim').classList.add('on');}
function closePanel(){document.getElementById('panel').classList.remove('on');document.getElementById('scrim').classList.remove('on');}
document.getElementById('scrim').addEventListener('click',closePanel);
document.querySelectorAll('[data-sheet]').forEach(b=>b.addEventListener('click',()=>openSheet(b.dataset.sheet)));
document.getElementById('mobMenu').addEventListener('click',()=>openSheet('more'));

document.getElementById('themeBtn').addEventListener('click',()=>root.setAttribute('data-theme',root.getAttribute('data-theme')==='dark'?'light':'dark'));
document.getElementById('viewSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;document.body.classList.toggle('mob',b.dataset.v==='mob');[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));main.scrollTop=0;});

go('timeline');
</script>
</body>
</html>
