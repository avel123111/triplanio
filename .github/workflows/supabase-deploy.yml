# Sequential deploy for Triplanio — backend (Supabase) THEN frontend (Vercel).
# TRIP-73 (functions) + TRIP-68 Ф3 (migrations) + TRIP-134 Ф3 (sequential chain).
#
# Model: push → dev  deploys to Supabase dev  (nydhzevdizkfaxdlikgc) + Vercel (preview / dev domain)
#        push → main deploys to Supabase prod (tizscxrpuopobgcxbekf) + Vercel (production)
# Feature branches / Vercel previews never touch the backend.
#
# WHY this workflow now owns the frontend deploy (TRIP-134 Ф3): Vercel's Git
# auto-deploy for dev/main is disabled (Ignored Build Step exits 0 on dev/main,
# 1 elsewhere → PR previews still build). The frontend is deployed HERE, by
# token, AFTER the backend — so the frontend never ships ahead of its backend,
# and the token-based deploy sidesteps the Vercel Hobby "non-owner commit" block.
#
# Ordering (one shape for dev and main), via `needs` + result-aware `if`:
#   gate + detect
#     → migrate   (db push, STRICT — no --include-all)
#       → deploy  (edge functions; never outruns its migration)
#         → vercel (frontend; never ships before the backend)
#           → notify (Telegram, success AND failure, if: always())
# Front-only fast-path: if no supabase/** changed, migrate+deploy are skipped and
# vercel runs straight after the gate. A failure anywhere upstream stops the chain
# before vercel (frontend stays on the last good build) and notify reports it.
#
# MIGRATIONS (TRIP-68): history reconciled to a single baseline; repo == dev ==
# prod journals. New migrations MUST be timestamped (`supabase migration new`),
# never hand-numbered (CI guard 2a enforces this on PRs). `db push` applies only
# files newer than each project's journal.
#
# Requires repo secrets:
#   SUPABASE_ACCESS_TOKEN              — Management API token (functions deploy + assert)
#   SUPABASE_DB_URL_DEV / _PROD        — full Postgres URI per project (db push)
#   VERCEL_TOKEN                       — Vercel token (account scope, project access)
#   VERCEL_ORG_ID / VERCEL_PROJECT_ID  — from `.vercel/project.json` / Vercel settings
#   TELEGRAM_OPS_BOT_TOKEN / _CHAT_ID  — ops bot for deploy notifications
# CI does not manage per-function secrets (STRIPE_*, N8N_SECRET, RESEND_API_KEY, TELEGRAM_*).
name: Deploy (backend → frontend)

on:
  push:
    branches: [dev, main] # dev → Supabase dev + Vercel preview; main → prod + Vercel production
    # No paths filter: the frontend deploy must run on EVERY dev/main push now
    # that Vercel Git auto-deploy is off. The `detect` job decides whether the
    # backend jobs (migrate/deploy) actually run.
  # Manual run: redeploy backend + frontend on the branch you run it from.
  workflow_dispatch:

# One deploy per branch at a time; never cancel a deploy mid-flight.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Re-run the full gate on the merged branch before deploying anything.
  gate:
    uses: ./.github/workflows/checks.yml

  # Decide which backend jobs need to run (path-based). workflow_dispatch runs both.
  detect:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.f.outputs.functions }}
      migrations: ${{ steps.f.outputs.migrations }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            functions:
              - 'supabase/functions/**'
              - 'supabase/config.toml'
            migrations:
              - 'supabase/migrations/**'

  # 1. Migrations first — a function must never outrun its migration.
  migrate:
    name: Apply migrations
    needs: [gate, detect]
    if: >-
      ${{ !cancelled()
          && needs.gate.result == 'success'
          && needs.detect.result == 'success'
          && (github.event_name == 'workflow_dispatch' || needs.detect.outputs.migrations == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Apply pending migrations (db push)
        env:
          DB_URL_DEV: ${{ secrets.SUPABASE_DB_URL_DEV }}
          DB_URL_PROD: ${{ secrets.SUPABASE_DB_URL_PROD }}
        run: |
          set -euo pipefail
          case "${{ github.ref_name }}" in
            dev)  URL="$DB_URL_DEV" ;;
            main) URL="$DB_URL_PROD" ;;
            *) echo "::error::Unsupported branch '${{ github.ref_name }}'"; exit 1 ;;
          esac
          if [ -z "$URL" ]; then
            echo "::error::Missing DB URL secret for ${{ github.ref_name }} (SUPABASE_DB_URL_DEV/_PROD)"; exit 1
          fi
          # Non-interactive, STRICT (no --include-all): applies only migrations
          # newer than the project's journal. Out-of-order is rejected on purpose
          # (caught earlier by PR guard 2a; surfaced here by notify if it slips).
          supabase db push --db-url "$URL" --yes

  # 2. Edge functions — after migrations succeed (or are skipped).
  deploy:
    name: Deploy functions
    needs: [gate, detect, migrate]
    if: >-
      ${{ !cancelled()
          && needs.gate.result == 'success'
          && needs.detect.result == 'success'
          && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
          && (github.event_name == 'workflow_dispatch' || needs.detect.outputs.functions == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve target project
        id: target
        run: |
          case "${{ github.ref_name }}" in
            dev)  echo "ref=nydhzevdizkfaxdlikgc" >> "$GITHUB_OUTPUT" ;;
            main) echo "ref=tizscxrpuopobgcxbekf" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unsupported branch '${{ github.ref_name }}'"; exit 1 ;;
          esac

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy --project-ref ${{ steps.target.outputs.ref }}

      - name: Assert verify_jwt matches config.toml
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ steps.target.outputs.ref }}
        run: |
          set -uo pipefail
          # Source of truth = config.toml: every function pinned verify_jwt=false
          # there MUST be false on live. Catches the foot-gun where a deploy
          # silently flips an externally-callable function to true (401s on
          # webhook / public / N8N_SECRET callers).
          mapfile -t EXPECTED_FALSE < <(awk '
            /^\[functions\./ { name=$1; sub(/^\[functions\./,"",name); sub(/\]$/,"",name); cur=name; next }
            /^verify_jwt[[:space:]]*=/ { if (cur != "" && $0 ~ /false/) print cur; cur="" }
          ' supabase/config.toml)

          echo "Expecting verify_jwt=false for ${#EXPECTED_FALSE[@]} functions on $REF"
          RESP=$(curl -fsS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$REF/functions")
          # Normalize to a bare array (the endpoint may return [...] or {functions:[...]}).
          ITEMS=$(jq 'if type=="array" then . else (.functions // .data // []) end' <<<"$RESP")

          fail=0
          for fn in "${EXPECTED_FALSE[@]}"; do
            # tostring (NOT `// "MISSING"`): jq's `//` treats boolean false as empty,
            # so `false // "x"` returns "x" — every false function would falsely read
            # as MISSING. Stringify the bool and guard absence with length instead.
            vj=$(jq -r --arg s "$fn" \
              'map(select(.slug==$s)) | if length==0 then "MISSING" else (.[0].verify_jwt|tostring) end' \
              <<<"$ITEMS")
            if [ "$vj" != "false" ]; then
              echo "::error::verify_jwt drift: '$fn' is '$vj' on $REF (expected false)"
              fail=1
            else
              echo "ok: $fn = false"
            fi
          done
          exit $fail

  # 3. Frontend — strictly AFTER the backend. Runs on every dev/main push whose
  # gate passed; skipped only if an upstream backend job FAILED (chain stops →
  # frontend stays on the last good build). Front-only changes reach here with
  # migrate+deploy skipped (fast-path).
  vercel:
    name: Deploy frontend (Vercel)
    needs: [gate, detect, migrate, deploy]
    if: >-
      ${{ !cancelled()
          && needs.gate.result == 'success'
          && needs.detect.result == 'success'
          && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
          && (needs.deploy.result == 'success' || needs.deploy.result == 'skipped') }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Guard required secrets
        run: |
          set -uo pipefail
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::error::Missing VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID repo secrets"; exit 1
          fi

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Resolve Vercel environment
        id: venv
        run: |
          case "${{ github.ref_name }}" in
            main) echo "env=production" >> "$GITHUB_OUTPUT"; echo "prod=--prod" >> "$GITHUB_OUTPUT" ;;
            dev)  echo "env=preview"    >> "$GITHUB_OUTPUT"; echo "prod="       >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unsupported branch '${{ github.ref_name }}'"; exit 1 ;;
          esac

      # Pull project settings + env vars (VITE_*) for the target environment, then
      # build and deploy the prebuilt output. Token is read from $VERCEL_TOKEN.
      # The deploy runs inside the checked-out repo on the dev/main branch, so
      # Vercel associates it with that git branch → the branch/custom domain
      # (dev.triplanio.com / triplanio.com) follows. Verify on first run.
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.venv.outputs.env }}

      - name: Build
        run: vercel build ${{ steps.venv.outputs.prod }}

      - name: Deploy (prebuilt)
        run: vercel deploy --prebuilt ${{ steps.venv.outputs.prod }}

  # 4. Visibility (TRIP-134 Ф1, extended Ф3): one Telegram ping per run — success
  # AND failure. Runs LAST, `if: always()`, so it fires even when an upstream job
  # failed or was skipped (the chain stops at the first failure → downstream
  # skipped = terminal). Reports every job's result and points at the run.
  #
  # Dedicated OPS bot (NOT the production telegramWebhook bot). Until the secrets
  # exist the step no-ops gracefully (never fails the pipeline):
  #   TELEGRAM_OPS_BOT_TOKEN — ops bot token from @BotFather
  #   TELEGRAM_OPS_CHAT_ID   — chat/channel id the ops bot posts to
  notify:
    name: Notify (Telegram)
    needs: [gate, detect, migrate, deploy, vercel]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          TOKEN: ${{ secrets.TELEGRAM_OPS_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_OPS_CHAT_ID }}
          GATE: ${{ needs.gate.result }}
          DETECT: ${{ needs.detect.result }}
          MIGRATE: ${{ needs.migrate.result }}
          DEPLOY: ${{ needs.deploy.result }}
          VERCEL: ${{ needs.vercel.result }}
        run: |
          set -uo pipefail
          if [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "::warning::TELEGRAM_OPS_BOT_TOKEN / TELEGRAM_OPS_CHAT_ID not set — skipping Telegram notification"
            exit 0
          fi

          # Map branch → human target.
          case "${{ github.ref_name }}" in
            dev)  TARGET="dev (Supabase dev + Vercel preview)" ;;
            main) TARGET="prod (Supabase prod + Vercel production)" ;;
            *)    TARGET="${{ github.ref_name }}" ;;
          esac

          # Per-job glyph. A skipped job (path-filtered out, or chain stopped
          # before it) is neutral — only failure/cancelled count as bad.
          glyph() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "🚫" ;;
              skipped|"") echo "➖" ;;
              *)         echo "❓ $1" ;;
            esac
          }

          # Overall: bad if any tracked job failed or was cancelled.
          OVERALL="success"
          for r in "$GATE" "$DETECT" "$MIGRATE" "$DEPLOY" "$VERCEL"; do
            case "$r" in failure|cancelled) OVERALL="failure" ;; esac
          done
          if [ "$OVERALL" = "success" ]; then HEAD="✅ Deploy OK"; else HEAD="❌ Deploy FAILED"; fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="$HEAD — $TARGET
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          By: ${{ github.actor }}

          gate    $(glyph "$GATE")
          migrate $(glyph "$MIGRATE")   (db push)
          deploy  $(glyph "$DEPLOY")   (functions)
          vercel  $(glyph "$VERCEL")   (frontend)

          Run: $RUN_URL"

          # Plain text (no parse_mode) — avoids Markdown/HTML escaping landmines.
          curl -fsS -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true" \
            >/dev/null \
            && echo "Telegram notification sent ($OVERALL)" \
            || echo "::warning::Telegram sendMessage failed (non-fatal)"
