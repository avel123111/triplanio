# Auto-deploy Supabase backend for Triplanio — edge functions (TRIP-73) + migrations (TRIP-68 Ф3).
#
# Model: merge → dev  deploys to Supabase dev  (nydhzevdizkfaxdlikgc)
#        merge → main deploys to Supabase prod (tizscxrpuopobgcxbekf)
# Feature branches / Vercel previews never touch the backend.
#
# Two independent deploy jobs, each gated by what actually changed (detect job):
#   - deploy  : edge functions (config-driven `functions deploy`, verify_jwt from config.toml)
#   - migrate : `supabase db push` applies pending migrations from supabase/migrations/
# A functions-only change never re-pushes migrations; a migrations-only change never
# re-deploys all functions (avoids version churn).
#
# MIGRATIONS (TRIP-68): history was reconciled to a single baseline
# (supabase/migrations/20260625120000_baseline.sql); repo == dev == prod journals.
# Going forward: new migrations MUST be timestamped (`supabase migration new <name>`),
# NEVER hand-numbered 00NN (that re-introduces the drift TRIP-68 fixed). `db push`
# applies only files newer than what each project's journal already has.
#
# Requires repo secrets:
#   SUPABASE_ACCESS_TOKEN              — Management API token (functions deploy + assert), both projects
#   SUPABASE_DB_URL_DEV / _PROD        — full Postgres connection URI per project (session pooler or direct),
#                                        used by `db push`. Get from Dashboard → Settings → Database →
#                                        Connection string (URI), password included.
# CI does not manage per-function secrets (STRIPE_*, N8N_SECRET, RESEND_API_KEY, TELEGRAM_*).
name: Deploy Supabase (functions + migrations)

on:
  push:
    branches: [dev, main] # dev → Supabase dev; main → Supabase prod
    paths:
      - 'supabase/functions/**' # glob MUST cover _shared/** (fans out to consumers)
      - 'supabase/config.toml'
      - 'supabase/migrations/**'
  # Manual run: redeploy functions + re-push migrations on the branch you run it from.
  workflow_dispatch:

# One deploy per branch at a time; never cancel a deploy mid-flight.
concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Re-run the full gate on the merged branch before deploying.
  gate:
    uses: ./.github/workflows/checks.yml

  # Decide which deploy jobs need to run (path-based). workflow_dispatch runs both.
  detect:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.f.outputs.functions }}
      migrations: ${{ steps.f.outputs.migrations }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            functions:
              - 'supabase/functions/**'
              - 'supabase/config.toml'
            migrations:
              - 'supabase/migrations/**'

  deploy:
    name: Deploy functions
    needs: [gate, detect]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect.outputs.functions == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve target project
        id: target
        run: |
          case "${{ github.ref_name }}" in
            dev)  echo "ref=nydhzevdizkfaxdlikgc" >> "$GITHUB_OUTPUT" ;;
            main) echo "ref=tizscxrpuopobgcxbekf" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unsupported branch '${{ github.ref_name }}'"; exit 1 ;;
          esac

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy --project-ref ${{ steps.target.outputs.ref }}

      - name: Assert verify_jwt matches config.toml
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ steps.target.outputs.ref }}
        run: |
          set -uo pipefail
          # Source of truth = config.toml: every function pinned verify_jwt=false
          # there MUST be false on live. Catches the foot-gun where a deploy
          # silently flips an externally-callable function to true (401s on
          # webhook / public / N8N_SECRET callers).
          mapfile -t EXPECTED_FALSE < <(awk '
            /^\[functions\./ { name=$1; sub(/^\[functions\./,"",name); sub(/\]$/,"",name); cur=name; next }
            /^verify_jwt[[:space:]]*=/ { if (cur != "" && $0 ~ /false/) print cur; cur="" }
          ' supabase/config.toml)

          echo "Expecting verify_jwt=false for ${#EXPECTED_FALSE[@]} functions on $REF"
          RESP=$(curl -fsS -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$REF/functions")
          # Normalize to a bare array (the endpoint may return [...] or {functions:[...]}).
          ITEMS=$(jq 'if type=="array" then . else (.functions // .data // []) end' <<<"$RESP")

          fail=0
          for fn in "${EXPECTED_FALSE[@]}"; do
            # tostring (NOT `// "MISSING"`): jq's `//` treats boolean false as empty,
            # so `false // "x"` returns "x" — every false function would falsely read
            # as MISSING. Stringify the bool and guard absence with length instead.
            vj=$(jq -r --arg s "$fn" \
              'map(select(.slug==$s)) | if length==0 then "MISSING" else (.[0].verify_jwt|tostring) end' \
              <<<"$ITEMS")
            if [ "$vj" != "false" ]; then
              echo "::error::verify_jwt drift: '$fn' is '$vj' on $REF (expected false)"
              fail=1
            else
              echo "ok: $fn = false"
            fi
          done
          exit $fail

  migrate:
    name: Apply migrations
    needs: [gate, detect]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect.outputs.migrations == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Apply pending migrations (db push)
        env:
          DB_URL_DEV: ${{ secrets.SUPABASE_DB_URL_DEV }}
          DB_URL_PROD: ${{ secrets.SUPABASE_DB_URL_PROD }}
        run: |
          set -euo pipefail
          case "${{ github.ref_name }}" in
            dev)  URL="$DB_URL_DEV" ;;
            main) URL="$DB_URL_PROD" ;;
            *) echo "::error::Unsupported branch '${{ github.ref_name }}'"; exit 1 ;;
          esac
          if [ -z "$URL" ]; then
            echo "::error::Missing DB URL secret for ${{ github.ref_name }} (SUPABASE_DB_URL_DEV/_PROD)"; exit 1
          fi
          # Non-interactive: applies only migrations newer than the project's journal.
          # After TRIP-68 reconcile the journal holds the baseline, so this is a
          # no-op until a new timestamped migration lands.
          supabase db push --db-url "$URL" --yes

  # Visibility (TRIP-134, phase 1): one Telegram ping per deploy run — on success
  # AND on failure. Runs LAST and `if: always()`, so it fires even when an
  # upstream job failed or was skipped (the `needs` chain stops at the first
  # failure → downstream jobs are skipped → terminal state). Reports the result
  # of each backend job and points at the run.
  #
  # Sends via a dedicated OPS bot (NOT the production telegramWebhook bot). Until
  # the repo secrets exist the step no-ops gracefully (never fails the pipeline):
  #   TELEGRAM_OPS_BOT_TOKEN — ops bot token from @BotFather
  #   TELEGRAM_OPS_CHAT_ID   — chat/channel id the ops bot posts to
  notify:
    name: Notify (Telegram)
    needs: [gate, detect, deploy, migrate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          TOKEN: ${{ secrets.TELEGRAM_OPS_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_OPS_CHAT_ID }}
          GATE: ${{ needs.gate.result }}
          DEPLOY: ${{ needs.deploy.result }}
          MIGRATE: ${{ needs.migrate.result }}
        run: |
          set -uo pipefail
          if [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "::warning::TELEGRAM_OPS_BOT_TOKEN / TELEGRAM_OPS_CHAT_ID not set — skipping Telegram notification"
            exit 0
          fi

          # Map branch → human target. dev → Supabase dev, main → prod.
          case "${{ github.ref_name }}" in
            dev)  TARGET="Supabase dev" ;;
            main) TARGET="Supabase prod" ;;
            *)    TARGET="${{ github.ref_name }}" ;;
          esac

          # Per-job glyph. A skipped job (path-filtered out, or chain stopped
          # before it) is neutral — only failure/cancelled count as bad.
          glyph() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "🚫" ;;
              skipped|"") echo "➖" ;;
              *)         echo "❓ $1" ;;
            esac
          }

          # Overall: bad if any tracked backend job failed or was cancelled.
          OVERALL="success"
          for r in "$GATE" "$DEPLOY" "$MIGRATE"; do
            case "$r" in failure|cancelled) OVERALL="failure" ;; esac
          done
          if [ "$OVERALL" = "success" ]; then HEAD="✅ Backend deploy OK"; else HEAD="❌ Backend deploy FAILED"; fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="$HEAD — $TARGET
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          By: ${{ github.actor }}

          gate    $(glyph "$GATE")
          deploy  $(glyph "$DEPLOY")   (functions)
          migrate $(glyph "$MIGRATE")   (db push)

          Run: $RUN_URL"

          # Plain text (no parse_mode) — avoids Markdown/HTML escaping landmines.
          curl -fsS -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true" \
            >/dev/null \
            && echo "Telegram notification sent ($OVERALL)" \
            || echo "::warning::Telegram sendMessage failed (non-fatal)"
