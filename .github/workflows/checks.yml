# Reusable CI checks for Triplanio (TRIP-73, Ф2).
#
# Single source of truth for the gate, called by BOTH:
#   - ci.yml              (on pull_request — blocks merge)
#   - supabase-deploy.yml (on push to dev/main — gates the deploy via `needs:`)
#
# Jobs split into BLOCKING (green today) and NON-BLOCKING (pre-existing baseline
# debt — kept informational so the first PR doesn't go red and freeze all
# merges, per the plan: baseline → fix → only then flip to blocking).
#
#   BLOCKING (verified green on dev, 25.06.2026 — Node 22):
#     - frontend  : npm ci → lint → test → build
#     - typecheck : tsc — green since TRIP-93 (26.06.2026). The project is JS/JSX,
#                   so `checkJs` is OFF in jsconfig.json (it produced ~1202 false
#                   "missing prop" errors on untyped JSX + ~89 in luxon.mjs — noise,
#                   not bugs). tsc now validates syntax / JSX / imports for the
#                   whole tree, AND fully type-checks the growing opt-in set of
#                   files that carry a `// @ts-check` pragma (ratchet — start =
#                   the entitlement/Pro cluster: src/lib/{limits,subscription,
#                   tripAddons,useTripAccess}.js). Add `// @ts-check` to a file to
#                   bring it under real type enforcement; breaking its types fails
#                   THIS gate. Grow coverage file-by-file, no big-bang TS migration.
#
# NON-BLOCKING jobs report GREEN with a warning annotation (step-level
# continue-on-error) so the PR isn't a misleading red — they run, but their
# known pre-existing baseline doesn't block merge. Flip to blocking later by
# dropping continue-on-error + the annotate step and marking them required.
#     - deno      : deno check on edge functions — 14 pre-existing errors
#                   (getTripDetails ×10, getActiveTrips/getFxRates/
#                   checkSubscriptionStatus ×3, getUserPlan ×1). The frontend
#                   toolchain never type-checks functions (jsconfig is src-only;
#                   eslint matches src/** .js only; functions are .ts) — see
#                   risk A. esbuild on deploy catches syntax, NOT types.
#
# Node 22: the project's `npm test` uses `node --test "src/**/*.test.js"` whose
# glob is expanded by Node's test runner only on Node 21+ (Node 20 fails with
# "Could not find"). Pin 22 so `npm test` runs as written.
name: checks

on:
  workflow_call:

jobs:
  frontend:
    name: Frontend (lint / test / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        # BLOCKING since TRIP-93 (was non-blocking under TRIP-73). Green because
        # checkJs is off (the JS/JSX tree isn't type-checked — that was ~1202 false
        # positives), while files marked `// @ts-check` ARE fully checked. A type
        # break in any opt-in file (or a syntax/import/JSX error anywhere) fails
        # the PR. Mark this check required in branch protection to enforce on merge.
        run: npm run typecheck

  deno:
    name: Deno typecheck (edge functions) — non-blocking until baseline fixed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('supabase/functions/**/*.ts') }}
          restore-keys: |
            deno-${{ runner.os }}-
      - name: Type-check edge functions
        id: denocheck
        # Step-level continue-on-error: job stays GREEN, failure surfaces as a
        # warning annotation below. 14 pre-existing errors (getTripDetails ×10,
        # getActiveTrips/getFxRates/checkSubscriptionStatus ×3, getUserPlan ×1).
        # --node-modules-dir=none forces Deno's own cache for npm:/URL imports
        # (the repo-root package.json would otherwise push Deno into node_modules
        # mode and fail to resolve npm:stripe etc.). --no-lock keeps CI lock-free.
        # TRIP-73: to make blocking once fixed, drop continue-on-error + annotate.
        continue-on-error: true
        run: deno check --no-lock --node-modules-dir=none $(find supabase/functions -name '*.ts')
      - name: Annotate deno baseline (non-blocking)
        if: steps.denocheck.outcome == 'failure'
        run: echo "::warning title=Deno baseline (non-blocking)::deno check has known pre-existing edge-function type errors — see the Type-check step log. Does not block merge."
