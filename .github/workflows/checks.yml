# Reusable CI checks for Triplanio (TRIP-73, Ф2).
#
# Single source of truth for the gate, called by BOTH:
#   - ci.yml              (on pull_request — blocks merge)
#   - supabase-deploy.yml (on push to dev/main — gates the deploy via `needs:`)
#
# Jobs split into BLOCKING (green today) and NON-BLOCKING (pre-existing baseline
# debt — kept informational so the first PR doesn't go red and freeze all
# merges, per the plan: baseline → fix → only then flip to blocking).
#
#   BLOCKING (verified green on dev, 25.06.2026 — Node 22):
#     - frontend : npm ci → lint → test → build
#
#   NON-BLOCKING (continue-on-error, with a known baseline to fix & then flip):
#     - typecheck : tsc — 8 pre-existing errors (src/pages/Trips.jsx,
#                   src/pages/create/PanelAi.jsx: Btn/Icon prop inference).
#     - deno      : deno check on edge functions — 14 pre-existing errors
#                   (getTripDetails ×10, getActiveTrips/getFxRates/
#                   checkSubscriptionStatus ×3, getUserPlan ×1). The frontend
#                   toolchain never type-checks functions (jsconfig is src-only;
#                   eslint matches src/** .js only; functions are .ts) — see
#                   risk A. esbuild on deploy catches syntax, NOT types.
#
# Node 22: the project's `npm test` uses `node --test "src/**/*.test.js"` whose
# glob is expanded by Node's test runner only on Node 21+ (Node 20 fails with
# "Could not find"). Pin 22 so `npm test` runs as written.
name: checks

on:
  workflow_call:

jobs:
  frontend:
    name: Frontend (lint / test / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  typecheck:
    name: Typecheck (tsc) — non-blocking until baseline fixed
    runs-on: ubuntu-latest
    # TRIP-73: remove `continue-on-error` to make blocking, once the 8 baseline
    # tsc errors are fixed (separate follow-up — touches the design-system
    # Btn/Icon prop types, needs review).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck

  deno:
    name: Deno typecheck (edge functions) — non-blocking until baseline fixed
    runs-on: ubuntu-latest
    # TRIP-73: remove `continue-on-error` to make blocking, once the 14 baseline
    # errors are fixed (separate follow-up — touches auth/Pro-gating code).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('supabase/functions/**/*.ts') }}
          restore-keys: |
            deno-${{ runner.os }}-
      - name: Type-check edge functions
        # --node-modules-dir=none forces Deno's own cache for npm:/URL imports
        # (the repo-root package.json would otherwise push Deno into node_modules
        # mode and fail to resolve npm:stripe etc.). --no-lock keeps CI lock-free.
        run: deno check --no-lock --node-modules-dir=none $(find supabase/functions -name '*.ts')
