# Reusable CI checks for Triplanio (TRIP-73, Ф2).
#
# Single source of truth for the gate, called by BOTH:
#   - ci.yml              (on pull_request — blocks merge)
#   - supabase-deploy.yml (on push to dev/main — gates the deploy via `needs:`)
#
# All three jobs are BLOCKING (the baseline debt that kept typecheck + deno
# informational under TRIP-73 has since been cleared — TRIP-93 / TRIP-94).
#
#   BLOCKING (verified green on dev, 25.06.2026 — Node 22):
#     - frontend  : npm ci → lint → test → build
#     - typecheck : tsc — green since TRIP-93 (26.06.2026). The project is JS/JSX,
#                   so `checkJs` is OFF in jsconfig.json (it produced ~1202 false
#                   "missing prop" errors on untyped JSX + ~89 in luxon.mjs — noise,
#                   not bugs). tsc now validates syntax / JSX / imports for the
#                   whole tree, AND fully type-checks the growing opt-in set of
#                   files that carry a `// @ts-check` pragma (ratchet — start =
#                   the entitlement/Pro cluster: src/lib/{limits,subscription,
#                   tripAddons,useTripAccess}.js). Add `// @ts-check` to a file to
#                   bring it under real type enforcement; breaking its types fails
#                   THIS gate. Grow coverage file-by-file, no big-bang TS migration.
#     - deno      : deno check on edge functions — green since TRIP-94 (the 14
#                   pre-existing type errors are fixed; getTripDetails ×10,
#                   getActiveTrips/getFxRates/checkSubscriptionStatus ×3,
#                   getUserPlan ×1). The frontend toolchain never type-checks
#                   functions (jsconfig is src-only; eslint matches src/** .js
#                   only; functions are .ts) — see risk A. esbuild on deploy
#                   catches syntax, NOT types, so this is the only type gate for
#                   functions.
#
# Node 22: the project's `npm test` uses `node --test "src/**/*.test.js"` whose
# glob is expanded by Node's test runner only on Node 21+ (Node 20 fails with
# "Could not find"). Pin 22 so `npm test` runs as written.
name: checks

on:
  workflow_call:

jobs:
  frontend:
    name: Frontend (lint / test / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        # BLOCKING since TRIP-93 (was non-blocking under TRIP-73). Green because
        # checkJs is off (the JS/JSX tree isn't type-checked — that was ~1202 false
        # positives), while files marked `// @ts-check` ARE fully checked. A type
        # break in any opt-in file (or a syntax/import/JSX error anywhere) fails
        # the PR. Mark this check required in branch protection to enforce on merge.
        run: npm run typecheck

  # PR-only guards (TRIP-134). Block a bad PR before it merges; they never touch
  # runtime. Skipped on push (post-merge re-run of this gate) since they diff
  # against the PR base. Each script: 0 ok, 1 violation, 2 internal error.
  #   2a check-migration-numbering   — dup / out-of-order / hand-typed timestamps
  #   2b check-destructive-migrations — DROP/RENAME/ALTER…DROP without opt-in marker
  #   2c check-verify-jwt            — new externally-callable fn missing config.toml pin
  #   2d check-i18n                  — duplicate keys + new hardcoded UI strings
  #
  # ONLY on PRs into `dev` (feature-branch → dev), where migrations/strings first
  # enter the codebase. On a `dev → main` promotion PR these would re-scan content
  # already gated and APPLIED to dev — and can't be acted on there (re-stamping an
  # applied migration = journal drift, TRIP-68). So scope them to base=dev.
  guards:
    name: PR guards (migrations / verify_jwt / i18n)
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'dev' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so we can diff against the base branch
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref }}"
      - name: 2a — migration numbering
        if: ${{ !cancelled() }}
        env: { BASE_REF: 'origin/${{ github.base_ref }}' }
        run: node scripts/ci/check-migration-numbering.mjs
      - name: 2b — destructive migrations
        if: ${{ !cancelled() }}
        env: { BASE_REF: 'origin/${{ github.base_ref }}' }
        run: node scripts/ci/check-destructive-migrations.mjs
      - name: 2c — verify_jwt for new functions
        if: ${{ !cancelled() }}
        env: { BASE_REF: 'origin/${{ github.base_ref }}' }
        run: node scripts/ci/check-verify-jwt.mjs
      - name: 2d — i18n (dup keys + hardcoded strings)
        if: ${{ !cancelled() }}
        env: { BASE_REF: 'origin/${{ github.base_ref }}' }
        run: node scripts/ci/check-i18n.mjs
      - name: 2e — security tiers (manifest self-consistency)
        if: ${{ !cancelled() }}
        run: node scripts/ci/check-security-tiers.mjs

  deno:
    name: Deno typecheck (edge functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Cache Deno dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('supabase/functions/**/*.ts') }}
          restore-keys: |
            deno-${{ runner.os }}-
      - name: Type-check edge functions
        # BLOCKING since TRIP-94 (the 14 baseline type errors are fixed). A new
        # edge-function type error now fails the gate.
        # --node-modules-dir=none forces Deno's own cache for npm:/URL imports
        # (the repo-root package.json would otherwise push Deno into node_modules
        # mode and fail to resolve npm:stripe etc.). --no-lock keeps CI lock-free.
        run: deno check --no-lock --node-modules-dir=none $(find supabase/functions -name '*.ts')
      - name: Test edge functions (pure logic)
        # BLOCKING. Characterization + unit tests on pure edge-function helpers
        # (no Deno/Stripe/Supabase runtime deps). Guards the payment single-writer
        # (subscriptionRow) so a future refactor can't silently change what the
        # webhook writes. --no-check: types are already covered by the step above.
        run: deno test --no-lock --no-check --node-modules-dir=none $(find supabase/functions -name '*_test.ts')
