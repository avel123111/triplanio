<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="brand.css">
<style>
  .stage{display:flex;align-items:center;}
  .txt{position:relative;z-index:2;}
  .h{margin:30px 0 16px;}
  .h .warn{color:var(--warning);}
  .sub{color:var(--muted);}
  .viz{position:relative;}
  .hotel{background:#fff;border:1px solid var(--line);border-radius:20px;
    box-shadow:0 18px 44px rgba(12,14,28,.10);}
  .hotel .ev .m{color:var(--muted);opacity:1;}
  .toast{position:absolute;background:#1D1A29;color:#fff;border-radius:18px;
    box-shadow:0 24px 54px rgba(12,14,28,.45);display:flex;align-items:flex-start;gap:14px;}
  .toast .bico{flex:none;display:flex;align-items:center;justify-content:center;border-radius:12px;
    background:rgba(226,146,14,.2);color:var(--warning);}
  .toast .tt{font-weight:700;}
  .toast .tm{opacity:.75;font-weight:400;margin-top:3px;line-height:1.3;}
  .toast .when{font-family:var(--f-mono);opacity:.5;margin-left:auto;flex:none;}
  .site{position:absolute;font-size:15px;}
  /* landscape */
  .landscape{width:1200px;height:628px;padding:0 72px;gap:56px;}
  .landscape .txt{width:590px;flex:none;}
  .landscape .h{font-size:60px;}
  .landscape .sub{font-size:25px;max-width:530px;}
  .landscape .cta{font-size:23px;padding:17px 32px;margin-top:32px;}
  .landscape .viz{flex:1;height:400px;}
  .landscape .hotel{position:absolute;left:20px;top:105px;width:400px;padding:22px 26px;}
  .landscape .ev .ico{width:52px;height:52px;}
  .landscape .ev .t{font-size:20px;}
  .landscape .ev .m{font-size:14px;margin-top:4px;}
  .landscape .toast{left:16px;top:215px;width:404px;padding:18px 20px;}
  .landscape .toast .bico{width:44px;height:44px;}
  .landscape .toast .tt{font-size:17px;}
  .landscape .toast .tm{font-size:14px;}
  .landscape .toast .when{font-size:12px;}
  .landscape .site{right:72px;bottom:26px;}
  /* square */
  .square{width:1200px;height:1200px;flex-direction:column;align-items:flex-start;padding:84px 88px 90px;}
  .square .lockup .word{font-size:40px;}
  .square .h{font-size:96px;margin-top:52px;}
  .square .sub{font-size:40px;max-width:940px;}
  .square .cta{font-size:36px;padding:28px 52px;margin-top:40px;}
  .square .viz{flex:1;width:100%;margin-top:40px;}
  .square .hotel{position:absolute;left:40px;top:30px;width:560px;padding:28px 32px;}
  .square .ev .ico{width:62px;height:62px;}
  .square .ev .t{font-size:25px;}
  .square .ev .m{font-size:17px;margin-top:5px;}
  .square .toast{left:130px;top:185px;width:600px;padding:24px 28px;}
  .square .toast .bico{width:56px;height:56px;}
  .square .toast .tt{font-size:23px;}
  .square .toast .tm{font-size:19px;}
  .square .toast .when{font-size:15px;}
  .square .site{right:88px;bottom:34px;}
</style></head><body>
<div id="stage" class="stage light">
  <div class="txt">
    <div id="lockup"></div>
    <div class="h" id="h"></div>
    <div class="sub" id="sub"></div>
    <div class="cta"><span id="cta"></span><span class="arr">→</span></div>
  </div>
  <div class="viz">
    <div class="hotel" id="hotel"></div>
    <div class="toast" id="toast"></div>
  </div>
  <div class="site">triplanio.com</div>
</div>
<script src="kit.js"></script>
<script>
const S = {
  ru: { h:'Бесплатная отмена<br><span class="warn">сгорает тихо</span>',
        sub:'Triplanio следит за дедлайнами броней и напоминает заранее.',
        cta:'Включить напоминания',
        ev:['bed','Hotel Roma Centrale','12-15 окт · отмена до 10 окт','--ev-hotel'],
        tt:'Triplanio', tm:'Бесплатная отмена по Hotel Roma заканчивается через 3 дня', when:'сейчас' },
  en: { h:'Free cancellation<br><span class="warn">expires quietly</span>',
        sub:'Triplanio tracks booking deadlines and reminds you in advance.',
        cta:'Turn on reminders',
        ev:['bed','Hotel Roma Centrale','Oct 12-15 · free cancel till Oct 10','--ev-hotel'],
        tt:'Triplanio', tm:'Free cancellation for Hotel Roma ends in 3 days', when:'now' },
}[LANG];
const st=document.getElementById('stage'); st.classList.add(RATIO);
document.getElementById('lockup').outerHTML = lockup(RATIO==='square'?76:62);
document.getElementById('h').innerHTML=S.h;
document.getElementById('sub').textContent=S.sub;
document.getElementById('cta').textContent=S.cta;
const sq=RATIO==='square';
const [ic,t,m,c]=S.ev;
document.getElementById('hotel').innerHTML=`<div class="ev">
  <span class="ico" style="background:var(${c})">${ICONS[ic](sq?30:24)}</span>
  <div><div class="t">${t}</div><div class="m">${m}</div></div></div>`;
document.getElementById('toast').innerHTML=`<span class="bico">${ICONS.bell(sq?30:24)}</span>
  <div><div class="tt">${S.tt}</div><div class="tm">${S.tm}</div></div><span class="when">${S.when}</span>`;
</script></body></html>
