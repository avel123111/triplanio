<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="brand.css">
<style>
  .stage{width:1080px;height:1350px;display:flex;flex-direction:column;padding:80px 84px 64px;}
  .h{font-size:86px;}
  .h .b{color:var(--brand);}
  .sub{font-size:31px;color:var(--muted);margin-top:20px;max-width:880px;line-height:1.4;}
  .viz{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;}
  .trip{width:720px;background:linear-gradient(160deg,#16294A 0%,#0c0e1c 100%);color:var(--ink-inv);
    border-radius:26px;padding:40px 44px;box-shadow:0 30px 70px rgba(22,41,74,.4);}
  .trip .tt{font-family:var(--f-disp);font-weight:800;font-size:38px;}
  .trip .route{font-family:var(--f-mono);font-weight:600;font-size:18px;opacity:.6;margin-top:8px;letter-spacing:.03em;}
  .avs{display:flex;margin-top:26px;}
  .av{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:26px;border:4px solid #16294A;margin-right:-18px;}
  .av.plus{background:rgba(255,255,255,.16);}
  .split{display:flex;gap:14px;margin-top:30px;}
  .split .sp1{flex:1;background:rgba(255,255,255,.08);border:1px solid var(--glass-line);
    border-radius:14px;padding:16px 20px;}
  .split .sl{font-size:16px;opacity:.6;}
  .split .sv{font-family:var(--f-mono);font-weight:700;font-size:24px;margin-top:6px;}
  .linkpill{display:flex;align-items:center;gap:14px;background:#fff;color:var(--ink);border-radius:999px;
    padding:20px 34px;font-family:var(--f-mono);font-weight:600;font-size:21px;
    box-shadow:0 20px 50px rgba(12,14,28,.25);margin-top:-32px;position:relative;z-index:2;}
  .linkpill .lk{color:var(--brand);display:flex;}
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
  .brandline .lockup .word{font-size:34px;}
  .cta{font-size:27px;padding:21px 40px;}
</style></head><body>
<div id="stage" class="stage light">
  <div class="h" id="h"></div>
  <div class="sub" id="sub"></div>
  <div class="viz">
    <div class="trip" id="trip"></div>
    <div class="linkpill" id="pill"></div>
  </div>
  <div class="foot">
    <div class="brandline"><div id="lockup"></div></div>
    <div class="cta"><span id="cta"></span><span class="arr">→</span></div>
  </div>
</div>
<script src="kit.js"></script>
<script>
const S = {
  ru: { h:'Вся компания -<br><span class="b">в одном маршруте</span>',
        sub:'Кто летит, где спим и кто сколько потратил - видно всем. Вход по одной ссылке, приглашённым бесплатно.',
        tt:'Лиссабон вчетвером', route:'LIS · 12-18 МАЯ · 4 УЧАСТНИКА',
        avs:[['П','#2173C8'],['М','#15A2B0'],['К','#E0568F'],['А','#E2920E']],
        s1:['Потратили вместе','€1 240'], s2:['Максим должен','€ 85'],
        cta:'Создать общий трип' },
  en: { h:'Your whole crew -<br><span class="b">one itinerary</span>',
        sub:'Who flies when, where you sleep, who spent what - visible to everyone. One link to join, free for invitees.',
        tt:'Lisbon with friends', route:'LIS · MAY 12-18 · 4 TRAVELERS',
        avs:[['P','#2173C8'],['M','#15A2B0'],['K','#E0568F'],['A','#E2920E']],
        s1:['Spent together','€1,240'], s2:['Max owes','€ 85'],
        cta:'Start a shared trip' },
}[LANG];
document.getElementById('h').innerHTML=S.h;
document.getElementById('sub').textContent=S.sub;
document.getElementById('lockup').outerHTML=lockup(60);
document.getElementById('cta').textContent=S.cta;
const avz=S.avs.map(([n,c])=>`<span class="av" style="background:${c}">${n}</span>`).join('')+`<span class="av plus">+</span>`;
document.getElementById('trip').innerHTML=`<div class="tt">${S.tt}</div><div class="route">${S.route}</div>
  <div class="avs">${avz}</div>
  <div class="split">
    <div class="sp1"><div class="sl">${S.s1[0]}</div><div class="sv">${S.s1[1]}</div></div>
    <div class="sp1"><div class="sl">${S.s2[0]}</div><div class="sv">${S.s2[1]}</div></div>
  </div>`;
document.getElementById('pill').innerHTML=`<span class="lk">${ICONS.link(24)}</span>triplanio.com/join/lis25`;
</script></body></html>
