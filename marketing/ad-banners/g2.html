<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="brand.css">
<style>
  .stage{display:flex;align-items:center;}
  .txt{position:relative;z-index:2;}
  .h{margin:30px 0 16px;}
  .sub{color:var(--muted);}
  .viz{position:relative;}
  /* messy inbox */
  .inbox{display:flex;flex-direction:column;}
  .mailrow{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);
    border-radius:14px;color:var(--muted);box-shadow:0 8px 20px rgba(12,14,28,.06);}
  .mailrow .mi{flex:none;opacity:.55;}
  .mailrow .ms{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
  .mailrow.lost{opacity:.55;}
  .mailrow.hot{color:var(--ink);border-color:rgba(33,115,200,.45);}
  /* result card */
  .trip{background:linear-gradient(160deg,#16294A 0%,#0c0e1c 100%);color:var(--ink-inv);
    border-radius:22px;box-shadow:0 24px 54px rgba(22,41,74,.35);}
  .trip .tt{font-family:var(--f-disp);font-weight:800;}
  .trip .row{display:flex;align-items:center;gap:12px;font-weight:500;}
  .trip .row .ico{flex:none;display:flex;align-items:center;justify-content:center;border-radius:10px;color:#fff;}
  .trip .row .m{font-family:var(--f-mono);margin-left:auto;opacity:.6;}
  .flow-arr{position:absolute;color:var(--brand);z-index:3;}
  .site{position:absolute;font-size:15px;}
  /* landscape */
  .landscape{width:1200px;height:628px;padding:0 72px;gap:56px;}
  .landscape .txt{width:560px;flex:none;}
  .landscape .h{font-size:62px;}
  .landscape .sub{font-size:25px;max-width:500px;}
  .landscape .cta{font-size:23px;padding:17px 32px;margin-top:32px;}
  .landscape .viz{flex:1;height:470px;}
  .landscape .inbox{gap:12px;width:250px;position:absolute;left:0;top:50%;transform:translateY(-50%) rotate(-2deg);}
  .landscape .mailrow{padding:13px 16px;font-size:14px;}
  .landscape .trip{position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:300px;padding:24px;}
  .landscape .trip .tt{font-size:20px;margin-bottom:16px;}
  .landscape .trip .row{font-size:15px;padding:9px 0;}
  .landscape .trip .row .ico{width:34px;height:34px;}
  .landscape .trip .row .m{font-size:12px;}
  .landscape .flow-arr{display:none;}
  .landscape .site{right:72px;bottom:26px;}
  /* square */
  .square{width:1200px;height:1200px;flex-direction:column;align-items:flex-start;padding:84px 88px 90px;}
  .square .lockup .word{font-size:40px;}
  .square .h{font-size:100px;margin-top:52px;}
  .square .sub{font-size:40px;max-width:920px;}
  .square .cta{font-size:36px;padding:28px 52px;margin-top:40px;}
  .square .viz{flex:1;width:100%;margin-top:48px;}
  .square .inbox{gap:14px;width:440px;position:absolute;left:0;top:52%;transform:translateY(-50%) rotate(-2deg);}
  .square .mailrow{padding:16px 20px;font-size:19px;}
  .square .trip{position:absolute;right:0;top:50%;transform:translateY(-50%);width:430px;padding:32px;}
  .square .trip .tt{font-size:27px;margin-bottom:20px;}
  .square .trip .row{font-size:20px;padding:12px 0;}
  .square .trip .row .ico{width:44px;height:44px;}
  .square .trip .row .m{font-size:15px;}
  .square .flow-arr{left:465px;top:48%;}
  .square .site{right:88px;bottom:34px;}
</style></head><body>
<div id="stage" class="stage light">
  <div class="txt">
    <div id="lockup"></div>
    <div class="h" id="h"></div>
    <div class="sub" id="sub"></div>
    <div class="cta"><span id="cta"></span><span class="arr">→</span></div>
  </div>
  <div class="viz">
    <div class="inbox" id="inbox"></div>
    <div class="flow-arr" id="arr"></div>
    <div class="trip" id="trip"></div>
  </div>
  <div class="site">triplanio.com</div>
</div>
<script src="kit.js"></script>
<script>
const S = {
  ru: { h:'Брони тонут<br>в почте', sub:'Рейсы, отели, билеты - весь трип в одном месте, а не в 40 письмах.',
        cta:'Попробовать бесплатно',
        mails:[['Ваше бронирование подтверждено…','lost'],['Booking confirmation #82931…','hot'],
               ['Ваш электронный билет готов…','lost'],['Изменение рейса: уточните…','lost']],
        tt:'Рим, 12-15 окт',
        rows:[['plane','Рейс в Рим','12:40','--ev-transfer'],['bed','Hotel Roma','3 ночи','--ev-hotel'],['ticket','Колизей','10:00','--ev-activity']] },
  en: { h:'Bookings drown<br>in email', sub:'Flights, hotels, tickets - your whole trip in one place, not in 40 emails.',
        cta:'Try it free',
        mails:[['Your booking is confirmed…','lost'],['Booking confirmation #82931…','hot'],
               ['Your e-ticket is ready…','lost'],['Flight change: please review…','lost']],
        tt:'Rome, Oct 12-15',
        rows:[['plane','Flight to Rome','12:40','--ev-transfer'],['bed','Hotel Roma','3 nights','--ev-hotel'],['ticket','Colosseum','10:00','--ev-activity']] },
}[LANG];
const st=document.getElementById('stage'); st.classList.add(RATIO);
document.getElementById('lockup').outerHTML = lockup(RATIO==='square'?76:62);
document.getElementById('h').innerHTML=S.h;
document.getElementById('sub').textContent=S.sub;
document.getElementById('cta').textContent=S.cta;
const mi=RATIO==='square'?24:19, ri=RATIO==='square'?24:19;
document.getElementById('inbox').innerHTML=S.mails.map(([t,c])=>`
  <div class="mailrow ${c}"><span class="mi">${ICONS.mail(mi)}</span><span class="ms">${t}</span></div>`).join('');
document.getElementById('arr').innerHTML=`<svg width="${RATIO==='square'?130:96}" height="${RATIO==='square'?90:66}" viewBox="0 0 96 66" fill="none"><path d="M4 33h74M62 15l18 18-18 18" stroke="#2173C8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
document.getElementById('trip').innerHTML=`<div class="tt">${S.tt}</div>`+S.rows.map(([ic,t,m,c])=>`
  <div class="row"><span class="ico" style="background:var(${c})">${ICONS[ic](ri)}</span><span>${t}</span><span class="m">${m}</span></div>`).join('');
</script></body></html>
